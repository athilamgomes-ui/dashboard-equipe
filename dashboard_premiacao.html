<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premiação 2026 — Grupo A.M. Gomes</title>
<style>
:root {
  --bg:#0f172a; --bg2:#1e293b; --bg3:#334155;
  --text:#f1f5f9; --muted:#94a3b8; --border:#334155;
  --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6; --orange:#f97316;
  --L1:#ffb347; --L3:#00d4aa; --L4:#7c5cfc; --L5:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
/* ── header ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hdr h1{font-size:17px;font-weight:700}
.hdr-sub{color:var(--muted);font-size:12px;margin-top:1px}
select.mes-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;margin-left:auto}
select.mes-sel:focus{outline:none;border-color:var(--blue)}
/* ── tabs ── */
.tabs{display:flex;gap:6px;padding:14px 24px 0;overflow-x:auto}
.tab{padding:7px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;font-size:12px;border:1px solid var(--border);border-bottom:none;background:var(--bg2);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab[data-k="L1"].on{background:rgba(255,179,71,.15);color:var(--L1);border-color:var(--L1)}
.tab[data-k="L3"].on{background:rgba(0,212,170,.15);color:var(--L3);border-color:var(--L3)}
.tab[data-k="L4"].on{background:rgba(124,92,252,.15);color:var(--L4);border-color:var(--L4)}
.tab[data-k="L5"].on{background:rgba(239,68,68,.15);color:var(--L5);border-color:var(--L5)}
.tab[data-k="anual"].on{background:rgba(59,130,246,.15);color:var(--blue);border-color:var(--blue)}
/* ── content ── */
.content{padding:0 24px 40px}
.empty-mes{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-mes h2{font-size:18px;margin-bottom:8px;color:var(--text)}
/* ── loja header ── */
.loja-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:0 12px 12px 12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.loja-nm{font-size:15px;font-weight:700}
.pill{background:var(--bg3);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--muted)}
.pill b{color:var(--text)}
/* ── semanas grid ── */
.sems-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:22px}
.sem-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative}
.sem-card.current{border-color:var(--blue)}
.sem-card.current::before{content:'ATUAL';position:absolute;top:-9px;right:14px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px}
.sem-card.future{opacity:.55}
.sem-ttl{font-weight:700;font-size:13px;margin-bottom:2px}
.sem-per{color:var(--muted);font-size:11px;margin-bottom:10px}
.sem-nums{display:flex;gap:10px;margin-bottom:10px}
.num-blk{flex:1}
.num-blk label{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.num-blk .v{font-size:15px;font-weight:700}
.num-blk .s{font-size:11px;color:var(--muted)}
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:3px}
.pool-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:7px;padding:7px 10px;margin-bottom:7px}
.pool-lbl{font-size:11px;color:var(--muted)}
.pool-val{font-size:14px;font-weight:700}
.bonus-tag{font-size:10px;color:var(--yellow);margin-left:5px}
.marcasa-row{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.18);border-radius:7px}
.marcasa-row label{font-size:11px;color:var(--yellow);flex:1}
input.mа-in{width:54px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:2px 7px;font-size:12px;text-align:right}
input.mа-in:focus{outline:none;border-color:var(--blue)}
.ma-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.ma-ok{background:rgba(34,197,94,.2);color:var(--green)}
.ma-no{background:rgba(148,163,184,.1);color:var(--muted)}
/* ── tier badge ── */
.tier{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}
.t-none{background:rgba(148,163,184,.1);color:var(--muted)}
.t-0{background:rgba(239,68,68,.15);color:var(--red)}
.t-70{background:rgba(239,68,68,.15);color:var(--red)}
.t-80{background:rgba(234,179,8,.15);color:var(--yellow)}
.t-90{background:rgba(234,179,8,.15);color:var(--yellow)}
.t-100{background:rgba(34,197,94,.15);color:var(--green)}
.t-110{background:rgba(34,197,94,.2);color:var(--green)}
.t-120{background:rgba(59,130,246,.2);color:var(--blue)}
/* ── secao titulo ── */
.sec-ttl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── vendedoras table ── */
.vt{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px}
.vt-hdr,.vt-row{display:grid;gap:0;padding:9px 14px;align-items:center}
.vt-hdr{background:var(--bg3);font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
.vt-row{border-top:1px solid var(--border);transition:background .12s}
.vt-row:hover{background:rgba(255,255,255,.03)}
.vt-name{font-weight:600;font-size:13px}
.cell-r{text-align:right}
.cell-amt{font-size:12px;font-weight:600}
.cell-sub{font-size:10px;color:var(--muted)}
.prize-cell{font-weight:700;font-size:13px}
/* ── resumo mensal ── */
.resumo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:8px}
.resumo-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.rc-ttl{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.rc-val{font-size:22px;font-weight:700}
.rc-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* ── marcas A individual (mes) ── */
.indiv-ma-section{background:var(--bg2);border:1px solid rgba(234,179,8,.3);border-radius:10px;padding:14px;margin-bottom:22px}
.ima-ttl{font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:10px}
.ima-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.ima-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:7px;padding:7px 10px}
.ima-name{flex:1;font-size:12px}
/* ── annual view ── */
.annual-table-wrap{overflow-x:auto;margin-bottom:24px}
.annual-table{border-collapse:collapse;width:100%;min-width:700px}
.annual-table th,.annual-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap}
.annual-table th{background:var(--bg3);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
.annual-table td.loja-col{text-align:left;font-weight:700}
.annual-table tr.subtotal td{background:rgba(255,255,255,.02);font-weight:700;color:var(--text)}
.annual-table tr.grand td{background:rgba(59,130,246,.07);font-weight:700;color:var(--blue);font-size:13px}
.cell-green{color:var(--green)}
.cell-yellow{color:var(--yellow)}
.cell-red{color:var(--red)}
.cell-muted{color:var(--muted)}
/* ── info nota ── */
.nota{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:9px 13px;font-size:12px;color:#93c5fd;margin-bottom:16px;line-height:1.5}
/* ── indiv prize condition ── */
.cond-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700}
.cond-a{background:rgba(34,197,94,.15);color:var(--green)}
.cond-b{background:rgba(59,130,246,.15);color:var(--blue)}
.cond-no{background:rgba(148,163,184,.1);color:var(--muted)}
/* ── badges de vendedora (gerente/caixa/gestante/nova) ── */
.vbadge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-left:5px;vertical-align:middle}
.vb-gerente{background:rgba(124,92,252,.2);color:#a78bfa}
.vb-caixa{background:rgba(148,163,184,.18);color:#cbd5e1}
.vb-gestante{background:rgba(236,72,153,.18);color:#f9a8d4}
.vb-nova{background:rgba(59,130,246,.18);color:#93c5fd}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
/* ── sugestões ── */
.tab[data-k="sugestoes"].on{background:rgba(234,179,8,.15);color:var(--yellow);border-color:var(--yellow)}
.tab[data-k="analise"].on{background:rgba(34,197,94,.15);color:var(--green);border-color:var(--green)}
.sug-hdr{background:linear-gradient(135deg,rgba(234,179,8,.08),rgba(249,115,22,.05));border:1px solid rgba(234,179,8,.3);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sug-hdr h2{font-size:15px;color:var(--yellow);margin:0}
.sug-hdr .pill{background:rgba(0,0,0,.25)}
.sug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:22px}
.sug-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
.sug-card[data-aval="funcionou"]{border-left:4px solid var(--green)}
.sug-card[data-aval="indiferente"]{border-left:4px solid var(--muted)}
.sug-card[data-aval="nao_funcionou"]{border-left:4px solid var(--red)}
.sug-card[data-aval=""]{border-left:4px solid var(--yellow)}
.sug-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px}
.sug-chip{padding:2px 8px;border-radius:5px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;background:var(--bg3);color:var(--muted)}
.sug-chip.tipo{background:rgba(124,92,252,.15);color:#a78bfa}
.sug-chip.alvo{background:rgba(59,130,246,.15);color:#60a5fa}
.sug-chip.loja{background:rgba(0,0,0,.3);color:var(--text);font-weight:700}
.sug-chip.vend{background:rgba(0,212,170,.12);color:var(--L3)}
.sug-ttl{font-size:14px;font-weight:700;line-height:1.3}
.sug-desc{font-size:12px;color:#cbd5e1;line-height:1.5;white-space:pre-wrap}
.sug-actions{display:flex;gap:6px;margin-top:4px}
.sug-btn{flex:1;padding:7px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.sug-btn:hover{background:rgba(255,255,255,.06)}
.sug-btn.on-funcionou{background:rgba(34,197,94,.2);color:var(--green);border-color:var(--green)}
.sug-btn.on-indiferente{background:rgba(148,163,184,.15);color:#cbd5e1;border-color:var(--muted)}
.sug-btn.on-nao_funcionou{background:rgba(239,68,68,.2);color:var(--red);border-color:var(--red)}
.sug-comment{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit;resize:vertical;min-height:38px}
.sug-comment:focus{outline:none;border-color:var(--blue)}
.sug-saved{font-size:10px;color:var(--green);margin-top:2px}
.sug-empty{text-align:center;padding:36px 24px;color:var(--muted);background:var(--bg2);border:1px dashed var(--border);border-radius:12px}
/* ── análise ── */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px;margin-bottom:22px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.chart-card .chart-sub{font-size:11px;color:var(--muted);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.bar-row .lbl{width:130px;color:#cbd5e1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;display:flex;height:18px;border-radius:5px;background:var(--bg3);overflow:hidden}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;transition:width .3s}
.bar-seg.func{background:var(--green)}
.bar-seg.indif{background:var(--muted)}
.bar-seg.nao{background:var(--red)}
.bar-row .tot{width:38px;text-align:right;color:var(--muted);font-size:11px}
.score-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:11px;margin-left:auto}
.score-high{background:rgba(34,197,94,.2);color:var(--green)}
.score-mid{background:rgba(234,179,8,.2);color:var(--yellow)}
.score-low{background:rgba(239,68,68,.2);color:var(--red)}
.analise-empty{text-align:center;padding:50px 24px;color:var(--muted)}
.recents{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:14px}
.recents h3{font-size:13px;margin-bottom:10px;color:var(--text)}
.rec-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.rec-row:last-child{border-bottom:none}
.rec-row .rec-aval{width:90px;font-weight:700;font-size:11px}
.rec-row .rec-ttl{flex:1;color:#cbd5e1}
.rec-row .rec-data{color:var(--muted);font-size:11px;width:80px;text-align:right}
/* ── ajuste de meta ── */
.ajuste-meta{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(34,197,94,.05));border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:14px 18px;margin-bottom:18px}
.ajuste-meta h3{font-size:14px;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ajuste-meta .ajuste-status{font-size:12px;color:#cbd5e1;margin-bottom:10px}
.ajuste-tabela{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
.ajuste-tabela th{text-align:right;padding:6px 8px;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.ajuste-tabela td{text-align:right;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.ajuste-tabela td:first-child,.ajuste-tabela th:first-child{text-align:left;font-weight:600}
.ajuste-tabela .delta-pos{color:var(--green);font-weight:700}
.ajuste-tabela .delta-neg{color:var(--red);font-weight:700}
.ajuste-tabela .delta-zero{color:var(--muted)}
.ajuste-btns{display:flex;gap:8px;margin-top:10px}
.ajuste-btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.ajuste-btn.aplicar{background:var(--green);color:#fff}
.ajuste-btn.aplicar:hover{background:#16a34a}
.ajuste-btn.cancelar{background:var(--bg3);color:var(--muted)}
.ajuste-aplicado{font-size:11px;color:var(--green);margin-top:6px}
</style>

    <div class="hdr-sub" id="hdr-sub">Maio 2026</div>

  <select class="mes-sel" id="mes-sel" onchange="setMes(this.value)">

<div class="tabs" id="tabs">

</div>

<div class="content" id="content"></div>

// ─── CÁLCULO ─────────────────────────────────────────────────────────────────

function getPool(em_pct, marcasA_pct) {
  const bonus = marcasA_pct >= 30;
  if (em_pct >= 120) {
    const extra = Math.floor((em_pct - 120) / 10);
    const base = 420 + extra * 70;
    return bonus ? base + 50 : base;
  }
  for (const [min, b, bn] of SEMANAL_TABLE) {
    if (em_pct >= min) return bonus ? bn : b;
  }
  return 0;
}

function _frozenTem(mesKey, lojaKey, semId) {
  const lh = (HISTORICO_PREMIOS[mesKey] || {})[lojaKey];
  return (lh && lh._pool && lh._pool[semId] !== undefined) ? lh : null;
}

function calcSemana(ld, semId) {
  const sem = ld.semanas.find(s => s.id === semId);
  const vendas = ld.vendas[semId] || {};
  const total = Object.values(vendas).reduce((s,v)=>s+(v||0),0);
  const em_pct = sem.meta > 0 ? total/sem.meta*100 : 0;
  const ma = ld.marcasA_loja[semId] || 0;
  const pool = total > 0 ? getPool(em_pct, ma) : 0;
  return {sem, total, em_pct, ma, pool, vendas};
}

function indivPrize(mesKey, lojaKey, v) {
  const ld = DADOS[mesKey][lojaKey];
  const lojaTot = ld.semanas.reduce((s,sem)=>{
    return s + Object.values(ld.vendas[sem.id]||{}).reduce((a,x)=>a+(x||0),0);
  },0);
  const lojaEM = ld.meta_mensal > 0 ? lojaTot/ld.meta_mensal : 0;
  const vTot = ld.semanas.reduce((s,sem)=>s+((ld.vendas[sem.id]||{})[v]||0),0);
  if (isCaixa(v)) return {prize:0, eligible:false, cond:'caixa', vTot, lojaEM};
  const vMA = (ld.marcasA_indiv||{})[v] || 0;
  const condA = lojaEM >= 0.9 && vTot >= 31000;
  const condB = lojaEM < 0.9 && vTot >= 40000;
  if (!condA && !condB) return {prize:0, eligible:false, cond:null, vTot, lojaEM};
  for (const [min, b, bn] of MENSAL_TABLE) {
    if (vTot >= min) {
      return {prize: vMA>=30 ? bn : b, eligible:true, cond:condA?'A':'B', vTot, lojaEM, vMA};
    }
  }
  return {prize:0, eligible:false, cond:null, vTot, lojaEM};
}

// ─── FORMATO ─────────────────────────────────────────────────────────────────

function fR(v) { return v?'R$'+Math.round(v).toLocaleString('pt-BR'):'—' }
function fP(v) { return v.toFixed(1)+'%' }
function fTier(p) {
  if(p<1) return {cls:'t-none',lbl:'—'};
  if(p>=120) return {cls:'t-120',lbl:Math.floor(p/10)*10+'%+'};
  if(p>=110) return {cls:'t-110',lbl:'110%'};
  if(p>=100) return {cls:'t-100',lbl:'100%'};
  if(p>=90)  return {cls:'t-90', lbl:'90%'};
  if(p>=80)  return {cls:'t-80', lbl:'80%'};
  if(p>=70)  return {cls:'t-70', lbl:'70%'};
  return {cls:'t-0',lbl:'<70%'};
}
function barColor(p) {
  return p>=100?'#22c55e':p>=80?'#eab308':p>=70?'#f97316':'#ef4444';
}

    } else {
    const vends = LOJAS_BASE[lojaKey].vendedoras;

// ─── RENDER TABELA VENDEDORAS ─────────────────────────────────────────────────

function renderVendsTable(mesKey, lojaKey, ld) {
  const vends = LOJAS_BASE[lojaKey].vendedoras;
  const sems = ld.semanas;
  const semAtual = DADOS[mesKey].semana_atual;

  // Colunas: nome | S1 | S2 | S3 | S4 | Total | Prêm.Sem | Prêm.Mensal
  const cols = 'grid-template-columns:140px repeat(4,90px) 100px 110px 120px';

  const semCols = sems.map(s => {
    const c = calcSemana(ld, s.id);
    return `<div style="text-align:right">${s.label}${s.id===semAtual?'<br><span style="font-size:9px;color:var(--blue)">parcial</span>':''}</div>`;
  }).join('');

  let header = `<div class="vt-hdr" style="${cols}">
    <div>Vendedora</div>${semCols}
    <div style="text-align:right">Total</div>
    <div style="text-align:right">Prêm. Sem.</div>
    <div style="text-align:right">Prêm. Mensal</div>
  </div>`;

  let rows = vends.map(v => {
    const semVals = sems.map(s => {
      const c = calcSemana(ld, s.id);
      const vv = (ld.vendas[s.id]||{})[v] || 0;
      const pct = c.total > 0 ? vv/c.total*100 : 0;
      const isCur = s.id === semAtual;
      return `<div class="cell-r">
        <div class="cell-amt">${vv>0?fR(vv):'—'}</div>
        ${vv>0?`<div class="cell-sub">${fP(pct)}</div>`:''}
      </div>`;
    }).join('');

    const vTot = sems.reduce((s,sem)=>s+((ld.vendas[sem.id]||{})[v]||0),0);

    // Prêmios semanais (sems concluídas = sem atual excluída do "pago")
    // Caixa não recebe prêmio individual
    const caixa = isCaixa(v);
    let premSem = 0;
    if (!caixa) {
      sems.forEach(s => {
        if (s.id === semAtual) return; // em curso
        // Semana FECHADA congelada → lê o valor imutável (não recalcula).
        const fz = _frozenTem(mesKey, lojaKey, s.id);
        if (fz) { premSem += (fz[v]||{})[s.id] || 0; return; }
        const c = calcSemana(ld, s.id);
        const vv = (ld.vendas[s.id]||{})[v] || 0;
        if (vv > 0 && c.pool > 0 && c.total > 0) {
          const totalDistr = LOJAS_BASE[lojaKey].vendedoras
            .reduce((acc,x)=> acc + (isCaixa(x)?0:((ld.vendas[s.id]||{})[x]||0)), 0);
          if (totalDistr > 0) premSem += c.pool * (vv / totalDistr);
        }
      });
    }

    const mi = indivPrize(mesKey, lojaKey, v);

    return `<div class="vt-row" style="${cols}">
      <div class="vt-name">${v}${vBadges(v)}</div>
      ${semVals}
      <div class="cell-r">
        <div class="cell-amt">${vTot>0?fR(vTot):'—'}</div>
      </div>
      <div class="cell-r">
        ${caixa
          ? `<div class="cell-sub" style="color:var(--muted)">não recebe<br>(caixa)</div>`
          : `<div class="prize-cell" style="color:${premSem>0?'var(--green)':'var(--muted)'}">${premSem>0?fR(premSem):'—'}</div>
             <div class="cell-sub">sems concluídas</div>`
        }
      </div>
      <div class="cell-r">
        ${caixa
          ? `<div class="cell-sub" style="color:var(--muted)">não recebe<br>(caixa)</div>`
          : mi.eligible
            ? `<div class="prize-cell" style="color:var(--yellow)">${fR(mi.prize)}</div>
               <span class="cond-badge ${mi.cond==='A'?'cond-a':'cond-b'}">Cond. ${mi.cond}</span>
               ${mi.vMA>=30?'<div class="cell-sub" style="color:var(--yellow)">bônus MA ✦</div>':''}`
            : `<div class="cell-sub" style="color:var(--muted)">${projMensalNote(mi)}</div>`
        }
      </div>
    </div>`;
  }).join('');

  return `<div class="vt">${header}${rows}</div>`;
}

function projMensalNote(mi) {
  const {vTot, lojaEM} = mi;
  if (lojaEM >= 0.9) {
    const faltam = Math.max(0, 31000 - vTot);
    return faltam > 0 ? `faltam ${fR(faltam)} p/ R$31k` : 'loja <90% da meta';
  }
  const faltam = Math.max(0, 40000 - vTot);
  return faltam > 0 ? `faltam ${fR(faltam)} p/ R$40k` : 'verificar loja';
}

// ─── RENDER RESUMO MENSAL ─────────────────────────────────────────────────────

function renderResumo(mesKey, lojaKey, ld) {
  const semAtual = DADOS[mesKey].semana_atual;
  const vends = LOJAS_BASE[lojaKey].vendedoras;

  // Total prêmios semanais pagos (excluindo semana atual)
  let totalPago = 0;
  let totalProj = 0;
  ld.semanas.forEach(s => {
    const c = calcSemana(ld, s.id);
    if (c.pool > 0 && c.total > 0) {
      const nAtivas = Object.values(ld.vendas[s.id]||{}).filter(v=>v>0).length;
      if (s.id !== semAtual) totalPago += c.pool;
      totalProj += c.pool;
    }
  });

  // Total prêmios mensais individuais projetados
  let totalMensal = 0;
  vends.forEach(v => {
    const mi = indivPrize(mesKey, lojaKey, v);
    totalMensal += mi.prize;
  });

  // Acumulado da loja
  const acum = ld.semanas.reduce((s,sem)=>{
    return s + Object.values(ld.vendas[sem.id]||{}).reduce((a,v)=>a+(v||0),0);
  },0);
  const acumEM = ld.meta_mensal > 0 ? acum/ld.meta_mensal*100 : 0;

  return `<div class="resumo-grid">
    <div class="resumo-card">
      <div class="rc-ttl">Acumulado da loja</div>
      <div class="rc-val" style="color:${acumEM>=90?'#22c55e':acumEM>=70?'#eab308':'#ef4444'}">${fR(acum)}</div>
      <div class="rc-sub">${fP(acumEM)} da meta mensal (${fR(ld.meta_mensal)})</div>
    </div>
    <div class="resumo-card">
      <div class="rc-ttl">Prêmios semanais (pagos)</div>
      <div class="rc-val" style="color:var(--green)">${fR(totalPago)}</div>
      <div class="rc-sub">pool dividido proporcionalmente nas sems concluídas</div>
    </div>
    <div class="resumo-card">
      <div class="rc-ttl">Prêmio mensal individual (proj.)</div>
      <div class="rc-val" style="color:var(--yellow)">${totalMensal>0?fR(totalMensal):'R$0'}</div>
      <div class="rc-sub">soma de quem já qualificou (Cond. A ou B)</div>
    </div>
    <div class="resumo-card">
      <div class="rc-ttl">Total prêmios projetado</div>
      <div class="rc-val" style="color:var(--blue)">${fR(totalProj + totalMensal)}</div>
      <div class="rc-sub">semanais (todas as sems) + mensais individuais</div>
    </div>
  </div>`;
}

// ─── AJUSTE DINÂMICO DE META ─────────────────────────────────────────────────
// Regra: meta mensal fixa. Se uma semana terminou abaixo da meta, o gap é
// redistribuído nas semanas seguintes (proporcional ao peso original). Se passou
// da meta, o excedente reduz as seguintes.

// Padrão histórico de vendas por loja (Jan-Abr 2026, ERP Microvix)
// Cada loja tem 4 quartis (Q1..Q4) representando % do faturamento do mês.
// Usado para distribuir o "faltante" entre semanas restantes de forma realista,
// em vez de usar as metas semanais originais (que podem somar mais que a meta mensal).
const PADRAO_SEMANAL = {
  L1: {Q1:0.2613, Q2:0.2696, Q3:0.2131, Q4:0.256},
  L3: {Q1:0.2843, Q2:0.2771, Q3:0.1955, Q4:0.2432},
  L4: {Q1:0.2776, Q2:0.2439, Q3:0.2285, Q4:0.250},
  L5: {Q1:0.2253, Q2:0.2685, Q3:0.2362, Q4:0.2699},
};
const SEM_TO_Q = {S1:'Q1', S2:'Q2', S3:'Q3', S4:'Q4'};

function calcularAjusteMeta(ld, semAtual, lojaKey) {
  const sems = ld.semanas;
  const idxAtual = sems.findIndex(s => s.id === semAtual);
  if (idxAtual < 1) return null; // S1 ainda em curso, nada a redistribuir

  // Semanas já concluídas (até semana atual exclusiva)
  const concluidas = sems.slice(0, idxAtual);
  const restantes = sems.slice(idxAtual); // semana atual + futuras
  if (restantes.length === 0) return null;

  // Vendido acumulado nas semanas concluídas (real, do ERP)
  let vendidoAcum = 0;
  const gapPorSemana = concluidas.map(s => {
    const vendas = ld.vendas[s.id] || {};
    const total = Object.values(vendas).reduce((a,v)=>a+(v||0),0);
    vendidoAcum += total;
    return {sem:s, total, gap: s.meta - total};
  });

  // Falta pra meta MENSAL = meta_mensal − vendido_acumulado.
  // Esse valor é redistribuído entre as semanas restantes.
  const faltaMensal = ld.meta_mensal - vendidoAcum;
  const somaRestantesOrig = restantes.reduce((a,s)=>a+s.meta, 0);
  const gapTotal = faltaMensal - somaRestantesOrig; // delta vs metas originais

  if (Math.abs(gapTotal) < 100 && restantes.length > 1) return null;

  // Pesos: padrão histórico da loja (renormalizado pras semanas restantes)
  // Fallback: distribuição uniforme se loja não tem padrão.
  const padrao = PADRAO_SEMANAL[lojaKey];
  const usaHist = !!padrao;
  let pesos;
  if (usaHist) {
    const pesosBruto = restantes.map(s => padrao[SEM_TO_Q[s.id]] || 0.25);
    const somaPesos = pesosBruto.reduce((a,p)=>a+p, 0);
    pesos = pesosBruto.map(p => somaPesos > 0 ? p / somaPesos : 1/restantes.length);
  } else {
    pesos = restantes.map(() => 1/restantes.length);
  }

  // Sugestão = peso × faltaMensal (arredondado em R$100)
  const sugestao = restantes.map((s, i) => {
    const nova = Math.round(faltaMensal * pesos[i] / 100) * 100;
    return {sem:s, atual:s.meta, nova, delta: nova - s.meta};
  });

  // Ajuste final pra fechar a meta mensal exata na última semana
  const totalNovo = sugestao.reduce((s,x)=>s+x.nova, 0);
  const ajusteFinal = faltaMensal - totalNovo;
  if (ajusteFinal !== 0) {
    sugestao[sugestao.length-1].nova += ajusteFinal;
    sugestao[sugestao.length-1].delta += ajusteFinal;
  }

  return {gapTotal, gapPorSemana, sugestao, faltaMensal, vendidoAcum, usaHist, pesos};
}

// Helpers de decisão (persistente)
function _decisaoKey(mesKey, lojaKey) { return `${mesKey}|${lojaKey}`; }
function loadDecisoesMeta() {
  try { return JSON.parse(localStorage.getItem('ajustes_meta_decisoes') || '{}'); }
  catch(e) { return {}; }
}
function getDecisaoMeta(mesKey, lojaKey) {
  return loadDecisoesMeta()[_decisaoKey(mesKey, lojaKey)] || null;
}
function setDecisaoMeta(mesKey, lojaKey, decisao) {
  const all = loadDecisoesMeta();
  all[_decisaoKey(mesKey, lojaKey)] = {...decisao, em: new Date().toISOString()};
  localStorage.setItem('ajustes_meta_decisoes', JSON.stringify(all));
  // ⚠️ localStorage é por-device. Persistir nos dois stores compartilhados:
  // Supabase (fonte da verdade, durável) + Worker (fallback). Tipo 'ignorado'
  // não tem metas[] — não precisa enviar (default original já vale).
  if (decisao.tipo !== 'ignorado' && Array.isArray(decisao.metas)) {
    salvarMetasSupabase(mesKey, lojaKey, decisao.metas); // ← fonte da verdade
    try {
      fetch(`${WORKER_URL}/metas-loja`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mes: mesKey, loja: lojaKey, tipo: decisao.tipo, metas: decisao.metas})
      }).catch(e => console.warn('[metas-loja] falha de sync:', e));
    } catch(e) { console.warn('[metas-loja] erro:', e); }
  }
}

// Snapshot dos defaults originais ANTES de aplicar decisões — usado pelo reset
// pra restaurar a meta original sem precisar recarregar a página.
const METAS_ORIGINAIS = (() => {
  const out = {};
  for (const [mk, m] of Object.entries(DADOS)) {
    if (!m || typeof m !== 'object') continue;
    for (const [lk, ld] of Object.entries(m)) {
      if (!ld || !Array.isArray(ld.semanas)) continue;
      out[`${mk}|${lk}`] = ld.semanas.map(s => ({id:s.id, meta:s.meta}));
    }
  }
  return out;
})();

// Aplica decisões salvas em DADOS no carregamento (faz override dos defaults hardcoded).
// Sem isso, ao recarregar a página as metas voltavam pro valor original e o usuário
// via o card "decidido" sumir mas a meta antiga voltar.
function aplicarDecisoesSalvasNoDADOS() {
  const all = loadDecisoesMeta();
  for (const [key, dec] of Object.entries(all)) {
    if (!dec || dec.tipo === 'ignorado') continue; // ignorado não muda meta
    if (!Array.isArray(dec.metas)) continue;
    const [mesKey, lojaKey] = key.split('|');
    const ld = DADOS[mesKey]?.[lojaKey];
    if (!ld) continue;
    for (const m of dec.metas) {
      const sem = ld.semanas?.find(s => s.id === m.id);
      if (sem && typeof m.nova === 'number') sem.meta = m.nova;
    }
  }
}
// Aplica IMEDIATAMENTE (síncrono) — antes do primeiro render.
aplicarDecisoesSalvasNoDADOS();

// Aplica ajustes de meta vindos do Worker (compartilhados entre dispositivos
// e com o agente). Worker vence por semana. Espelha no localStorage (merge por
// semana) pra o estado da UI ficar consistente. Chamado no initDashboard após
// o fetch do Worker.
function aplicarMetasWorkerNoDADOS(items) {
  if (!Array.isArray(items) || !items.length) return;
  const all = loadDecisoesMeta();
  for (const it of items) {
    if (!it || !Array.isArray(it.metas)) continue;
    const ld = DADOS[it.mes]?.[it.loja];
    if (ld && Array.isArray(ld.semanas)) {
      for (const m of it.metas) {
        const sem = ld.semanas.find(s => s.id === m.id);
        if (sem && typeof m.nova === 'number') sem.meta = m.nova;
      }
    }
    // Espelha no localStorage — merge por semana (preserva semanas que só
    // existem localmente; Worker sobrescreve as que ele tem).
    const key = `${it.mes}|${it.loja}`;
    const existing = all[key];
    const merged = (existing && Array.isArray(existing.metas)) ? existing.metas.slice() : [];
    for (const m of it.metas) {
      const i = merged.findIndex(x => x.id === m.id);
      if (i >= 0) merged[i] = m; else merged.push(m);
    }
    all[key] = {tipo: it.tipo || 'custom', metas: merged, em: it.em || existing?.em};
  }
  localStorage.setItem('ajustes_meta_decisoes', JSON.stringify(all));
}

function renderAjusteMeta(mesKey, lojaKey, ld) {
  // Se já tem decisão registrada pra esse (mês, loja), não mostra o card
  if (getDecisaoMeta(mesKey, lojaKey)) return '';

  const semAtual = DADOS[mesKey].semana_atual;
  const aj = calcularAjusteMeta(ld, semAtual, lojaKey);
  if (!aj) return '';

  const {gapTotal, gapPorSemana, sugestao, faltaMensal, vendidoAcum, usaHist, pesos} = aj;
  const isFalta = gapTotal > 0;
  const padraoTxt = usaHist
    ? ` Distribuição baseada no <b>padrão histórico da ${lojaKey}</b> (Jan–Abr/2026): ${sugestao.map((s,i)=>`${s.sem.label.replace('Semana ','S')} ${(pesos[i]*100).toFixed(0)}%`).join(' · ')}.`
    : '';
  const statusText =
    `Vendido nas semanas fechadas: <b>${fR(vendidoAcum)}</b>. ` +
    `Falta <b>${fR(faltaMensal)}</b> pra bater a meta mensal de <b>${fR(ld.meta_mensal)}</b>.` +
    padraoTxt +
    (isFalta
      ? ` <span style="color:var(--red)">Acima das metas restantes originais em ${fR(gapTotal)} — precisa correr nas próximas.</span>`
      : ` <span style="color:var(--green)">Abaixo das metas restantes originais em ${fR(-gapTotal)} — dá pra aliviar as próximas.</span>`);

  const rowsConcl = gapPorSemana.map(g => {
    const gapCls = g.gap > 100 ? 'delta-neg' : g.gap < -100 ? 'delta-pos' : 'delta-zero';
    const gapTxt = g.gap > 0 ? `−${fR(g.gap)}` : g.gap < 0 ? `+${fR(-g.gap)}` : '—';
    return `<tr>
      <td>${g.sem.label}</td>
      <td>${fR(g.sem.meta)}</td>
      <td>${fR(g.total)}</td>
      <td class="${gapCls}">${gapTxt}</td>
      <td>—</td>
    </tr>`;
  }).join('');

  const rowsSug = sugestao.map(s => {
    const dCls = s.delta > 0 ? 'delta-pos' : s.delta < 0 ? 'delta-neg' : 'delta-zero';
    const dTxt = s.delta === 0 ? '—' : (s.delta > 0 ? `+${fR(s.delta)}` : `−${fR(-s.delta)}`);
    return `<tr>
      <td>${s.sem.label}${s.sem.id===semAtual?' <span style="color:var(--blue);font-size:10px">(atual)</span>':''}</td>
      <td>${fR(s.atual)}</td>
      <td>—</td>
      <td class="${dCls}">${dTxt}</td>
      <td><b>${fR(s.nova)}</b></td>
    </tr>`;
  }).join('');

  const dadosAplicar = JSON.stringify(sugestao.map(s=>({id:s.sem.id, nova:s.nova}))).replace(/"/g,'&quot;');

  // Form pra digitar meta custom (escondido até clicar em "ignorar e digitar")
  const inputsCustom = sugestao.map(s => `
    <tr>
      <td style="padding:6px 8px">${s.sem.label}${s.sem.id===semAtual?' <span style="color:var(--blue);font-size:10px">(atual)</span>':''}</td>
      <td style="padding:6px 8px;color:var(--muted)">${fR(s.atual)}</td>
      <td style="padding:6px 8px">
        <input type="number" id="custom-${lojaKey}-${s.sem.id}" value="${s.atual}" step="100" min="0"
          style="width:110px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 8px;font-size:13px;text-align:right">
      </td>
    </tr>`).join('');

  const idsRestantes = JSON.stringify(sugestao.map(s=>s.sem.id)).replace(/"/g,'&quot;');

  return `<div class="ajuste-meta" id="ajuste-${lojaKey}">
    <h3>📊 Sugestão de ajuste de meta</h3>
    <div class="ajuste-status">${statusText}</div>
    <table class="ajuste-tabela">
      <thead>
        <tr>
          <th>Semana</th>
          <th>Meta atual</th>
          <th>Vendido</th>
          <th>Diferença</th>
          <th>Nova meta</th>
        </tr>
      </thead>
      <tbody>
        ${rowsConcl}
        <tr style="border-top:2px solid var(--border)"><td colspan="5" style="padding-top:8px;color:var(--muted);font-size:11px;text-align:left">Sugestão para semanas restantes:</td></tr>
        ${rowsSug}
      </tbody>
    </table>
    <div class="ajuste-btns" id="ajuste-btns-${lojaKey}">
      <button class="ajuste-btn aplicar" onclick="aplicarAjusteMeta('${mesKey}','${lojaKey}', '${dadosAplicar}')">
        ✓ Aplicar nova distribuição
      </button>
      <button class="ajuste-btn cancelar" onclick="abrirCustomMeta('${lojaKey}')">

function aplicarAjusteMeta(mesKey, lojaKey, dadosStr) {
  const dados = JSON.parse(dadosStr.replace(/&quot;/g, '"'));
  const ld = DADOS[mesKey][lojaKey];
  dados.forEach(d => {
    const sem = ld.semanas.find(s => s.id === d.id);
    if (sem) sem.meta = d.nova;
  });
  // Persiste decisão E pendente (skill sincroniza no próximo run)
  setDecisaoMeta(mesKey, lojaKey, {tipo:'aplicado_sugestao', metas: dados});
  const pending = JSON.parse(localStorage.getItem('ajustes_meta_pendentes') || '[]');
  pending.push({mesKey, lojaKey, dados, aplicado_em: new Date().toISOString()});
  localStorage.setItem('ajustes_meta_pendentes', JSON.stringify(pending));
  rerender();
}

function abrirCustomMeta(lojaKey) {
  document.getElementById('ajuste-btns-'+lojaKey).style.display = 'none';
  document.getElementById('custom-form-'+lojaKey).style.display = 'block';
}

function salvarMetaCustom(mesKey, lojaKey, idsStr) {
  const ids = JSON.parse(idsStr.replace(/&quot;/g, '"'));
  const ld = DADOS[mesKey][lojaKey];
  const novasMetas = [];
  for (const id of ids) {
    const inputEl = document.getElementById(`custom-${lojaKey}-${id}`);
    if (!inputEl) continue;
    const val = parseFloat(inputEl.value);
    if (isNaN(val) || val < 0) {
      alert(`Valor inválido pra ${id}. Tente de novo.`);
      return;
    }
    const sem = ld.semanas.find(s => s.id === id);
    if (sem) {
      sem.meta = Math.round(val);
      novasMetas.push({id, nova: Math.round(val)});
    }
  }
  setDecisaoMeta(mesKey, lojaKey, {tipo:'custom', metas: novasMetas});
  const pending = JSON.parse(localStorage.getItem('ajustes_meta_pendentes') || '[]');
  pending.push({mesKey, lojaKey, dados: novasMetas, aplicado_em: new Date().toISOString(), origem: 'custom'});
  localStorage.setItem('ajustes_meta_pendentes', JSON.stringify(pending));
  rerender();
}

function ignorarAjusteMeta(mesKey, lojaKey) {
  setDecisaoMeta(mesKey, lojaKey, {tipo:'ignorado'});
  rerender();
}

// Restaura metas originais E remove decisão. Botão "↩️ resetar metas ajustadas"
// no header da loja aciona isso.
function resetarDecisaoMeta(mesKey, lojaKey) {
  // 1. Remove decisão do localStorage
  const all = loadDecisoesMeta();
  delete all[_decisaoKey(mesKey, lojaKey)];
  localStorage.setItem('ajustes_meta_decisoes', JSON.stringify(all));
  // 2. Restaura metas originais em DADOS (a partir do snapshot METAS_ORIGINAIS)
  const original = METAS_ORIGINAIS[_decisaoKey(mesKey, lojaKey)];
  const ld = DADOS[mesKey]?.[lojaKey];
  if (original && ld) {
    for (const o of original) {
      const sem = ld.semanas.find(s => s.id === o.id);
      if (sem) sem.meta = o.meta;
    }
  }
  // 3. Limpa também pendentes (skill não vai mais aplicar)
  const pending = JSON.parse(localStorage.getItem('ajustes_meta_pendentes') || '[]');
  const filtered = pending.filter(p => !(p.mesKey === mesKey && p.lojaKey === lojaKey));
  localStorage.setItem('ajustes_meta_pendentes', JSON.stringify(filtered));
  rerender();
}

// ─── RENDER EFICIÊNCIA DA VENDA (Ticket Médio + Peças/Ticket + CMV) ──────────
// Mostra média mensal (S1+S2+S3+S4) por vendedora — métrica chave pra avaliar
// QUALIDADE de venda, não só volume. Implementado 2026-05-27.
function renderEficienciaVenda(mesKey, lojaKey, ld) {
  if (!ld.tickets || !ld.pecas) return ''; // sem dados → não renderiza
  const vends = LOJAS_BASE[lojaKey].vendedoras;
  const sems = ld.semanas.map(s => s.id);

  const rows = vends.map(v => {
    let totVlr = 0, totTk = 0, totPc = 0;
    const cmvVals = [];
    for (const sId of sems) {
      const vlr = (ld.vendas[sId]||{})[v] || 0;
      const tk = (ld.tickets[sId]||{})[v] || 0;
      const pc = (ld.pecas[sId]||{})[v] || 0;
      const cm = (ld.cmv[sId]||{})[v];
      totVlr += vlr; totTk += tk; totPc += pc;
      if (typeof cm === 'number' && cm > 0 && cm < 100) cmvVals.push(cm);
    }
    if (totTk === 0) return null;
    const tm = totVlr / totTk;
    const pt = totPc / totTk;
    const cmvMed = cmvVals.length > 0 ? cmvVals.reduce((s,x)=>s+x,0) / cmvVals.length : null;
    return {v, totVlr, totTk, totPc, tm, pt, cmv: cmvMed};
  }).filter(Boolean);

  // Ordena por ticket médio descendente
  rows.sort((a,b) => b.tm - a.tm);

  // Cores: tm alto = verde, pt alto = verde, cmv alto = vermelho (pouca margem)
  const tmCores = (tm) => tm >= 100 ? '#22c55e' : tm >= 70 ? '#eab308' : '#ef4444';
  const ptCores = (pt) => pt >= 3.5 ? '#22c55e' : pt >= 2.5 ? '#eab308' : '#ef4444';
  const cmvCores = (cmv) => cmv === null ? 'var(--muted)' : cmv <= 45 ? '#22c55e' : cmv <= 55 ? '#eab308' : '#ef4444';

  const tbody = rows.map(r => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 10px;font-weight:600">${r.v}</td>
      <td style="padding:8px 10px;text-align:right">${fR(r.totVlr)}</td>
      <td style="padding:8px 10px;text-align:right">${r.totTk}</td>
      <td style="padding:8px 10px;text-align:right;font-weight:700;color:${tmCores(r.tm)}">${fR(r.tm)}</td>
      <td style="padding:8px 10px;text-align:right;font-weight:600;color:${ptCores(r.pt)}">${r.pt.toFixed(1)}</td>
      <td style="padding:8px 10px;text-align:right;font-weight:600;color:${cmvCores(r.cmv)}">${r.cmv !== null ? r.cmv.toFixed(1)+'%' : '—'}</td>
    </tr>
  `).join('');

  return `<div style="margin-top:16px">
    <div class="sec-ttl">📦 Eficiência da venda (média do mês)</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--bg2);border-radius:8px;overflow:hidden">
      <thead>
        <tr style="background:rgba(255,255,255,.04);border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:8px 10px">Vendedora</th>
          <th style="text-align:right;padding:8px 10px">Vendas R$</th>
          <th style="text-align:right;padding:8px 10px">Tickets</th>
          <th style="text-align:right;padding:8px 10px">Ticket Médio</th>
          <th style="text-align:right;padding:8px 10px">Peças/Ticket</th>
          <th style="text-align:right;padding:8px 10px">CMV %</th>
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>
    <div style="margin-top:8px;padding:8px 12px;background:rgba(0,0,0,.15);border-radius:6px;font-size:11px;color:#cbd5e1;line-height:1.5">
      💡 <b>Como ler:</b>
      <b>Ticket Médio</b> mede valor por venda (≥R$100 = premium · &lt;R$70 = produto barato).
      <b>Peças/Ticket</b> mede combo (≥3,5 = vende kit · &lt;2,5 = item único).
      <b>CMV%</b> mede margem (≤45% = ótimo · ≥55% = produto pouco rentável).
      Valores >100% de CMV ignorados (notas de devolução/bonificação distorcem o cálculo).
    </div>
  </div>`;
}

};

  conversao:'Conversão', vendas_individuais:'Vendas individuais'
};

// ─── AVALIAÇÃO OBJETIVA (baseline → resultado) ───────────────────────────────
// Pra cada sugestão calcula auto: baseline (sem anterior à publicação), resultado_real
// (sem em que foi avaliada) e status_objetivo (🟢 funcionou / 🟡 parcial / 🔴 não).
// Funciona pra meta_alvo ∈ {vendas_individuais, atingir_meta, marcas_a}.
// ticket_medio e conversao retornam null (não rastreáveis automaticamente — falta KPI).
//
// Thresholds default (podem ser overrideados em sug.threshold):
//   vendas_individuais → relativo_pct +15%
//   atingir_meta       → meta_pct  ≥100% (bateu meta da loja)
//   marcas_a           → absoluto_pp +5pp

const DEFAULT_THRESHOLDS = {
  vendas_individuais: {tipo:'relativo_pct', funcionou:15, parcial:5},      // +15% funcionou, +5% parcial
  atingir_meta:       {tipo:'meta_pct',     funcionou:100, parcial:90},    // ≥100% funcionou, ≥90% parcial
  marcas_a:           {tipo:'absoluto_pp',  funcionou:5,  parcial:2},      // +5pp / +2pp
};

// Da semana ISO da sug (ex '2026-W21'), descobre quais Sx do MES_KEY correspondem:
// W21 = 18-23/05 = S3. W22 = 25-30 = S4. Retorna {semBaselineId, semAvalId}.
//
// ⚠️ Caso especial — W21 (S3, mai/2026): App lançado quinta 21/05, no MEIO da S3.
// Antes do app vs depois do app é a comparação justa pras sugestões W21. Não compara
// com S2 (toda pré-app). Usa vendas_split.S3_pre (seg-qua 18-20/05) vs S3_pos
// (qui-sáb 21-23/05). Ver memória [[premiacao_metrica_antes_depois_app]].
// Outras semanas seguem regra padrão (S vs S-1).
function _semIdsDaSugestao(idSug) {
  const mapa = {
    'W21': {baseline:'S3_pre', avaliada:'S3_pos', label:'antes app (18-20/05) → depois app (21-23/05)'},
    'W22': {baseline:'S3',     avaliada:'S4'},
    'W19': {baseline:'',       avaliada:'S1'},
    'W20': {baseline:'S1',     avaliada:'S2'},
  };
  const m = idSug.match(/-W(\d+)-/);
  if (!m) return null;
  const k = 'W' + m[1].padStart(2,'0');
  return mapa[k] || null;
}

function _getMA(ld, semId, vendOuLoja) {
  if (!ld || !semId) return null;
  // S3_pre/S3_pos: não temos MA% por sub-período (relatório só gera por semana inteira).
  // Retornar null → calcAutoMetrics marca como "não rastreável" pra essas sugestões.
  if (semId === 'S3_pre' || semId === 'S3_pos') return null;
  if (vendOuLoja === '__loja__') {
    return ld.marcasA_loja?.[semId] ?? null;
  }
  // por vendedora: só temos média do mês (marcasA_indiv) — não dá pra detalhar por semana
  // Usar como aproximação a média do mês (limitação documentada na UI)
  return ld.marcasA_indiv?.[vendOuLoja] ?? null;
}

// IDs especiais S3_pre/S3_pos vêm de ld.vendas_split (sub-períodos de S3)
function _getVendasPorId(ld, semId) {
  if (semId === 'S3_pre' || semId === 'S3_pos') {
    return ld?.vendas_split?.[semId] || {};
  }
  return ld?.vendas?.[semId] || {};
}

function _getVendasIndiv(ld, semId, vend) {
  return _getVendasPorId(ld, semId)[vend] ?? 0;
}

function _getVendasLoja(ld, semId) {
  const v = _getVendasPorId(ld, semId);
  return Object.values(v).reduce((s,x) => s+(x||0), 0);
}

function _getMetaSem(ld, semId) {
  // S3_pre/S3_pos: 3 dias cada → meta da semana ÷ 2 (aproximação)
  if (semId === 'S3_pre' || semId === 'S3_pos') {
    const metaS3 = (ld?.semanas||[]).find(s => s.id === 'S3')?.meta || 0;
    return Math.round(metaS3 / 2);
  }
  return (ld?.semanas||[]).find(s => s.id === semId)?.meta || 0;
}

function calcAutoMetrics(sug) {
  if (!sug || !sug.meta_alvo) return null;
  if (!['vendas_individuais','atingir_meta','marcas_a'].includes(sug.meta_alvo)) {
    return {tipo:'nao_rastreavel', meta_alvo:sug.meta_alvo};
  }
  const ids = _semIdsDaSugestao(sug.id);
  if (!ids) return null;
  const mesKey = '2026-05'; // ⚠️ futuro: derivar de ids
  const ld = DADOS[mesKey]?.[sug.loja];
  if (!ld) return null;

  const th = sug.threshold || DEFAULT_THRESHOLDS[sug.meta_alvo];
  let baseline = null, resultado = null, status = null, deltaStr = '', unidade = '';

  if (sug.meta_alvo === 'vendas_individuais') {
    if (!sug.vendedora) return null;
    baseline = _getVendasIndiv(ld, ids.baseline, sug.vendedora);
    resultado = _getVendasIndiv(ld, ids.avaliada, sug.vendedora);
    unidade = 'R$';
    if (baseline > 0 && resultado > 0) {
      const variacao = (resultado - baseline) / baseline * 100;
      deltaStr = (variacao >= 0 ? '+' : '') + variacao.toFixed(0) + '%';
      if (variacao >= th.funcionou) status = 'funcionou';
      else if (variacao >= th.parcial) status = 'parcial';
      else status = 'nao_funcionou';
    } else if (resultado === 0 || resultado === null) {
      status = null; // semana ainda não fechou
    }
  }
  else if (sug.meta_alvo === 'atingir_meta') {
    if (sug.escopo === 'vendedora') {
      // Pra vendedora: bateu meta semanal proporcional dela? simplificado: usar % loja
      // (a vendedora não tem meta individual no schema)
    }
    // ⚠️ Caso especial W21 (S3_pre vs S3_pos): comparar VOLUMES, não % da meta
    // (a meta da semana é única — não faz sentido pedir 100% em meio período).
    // Compara crescimento de R$: se vendido_pos ≥ vendido_pre * (1 + threshold/100), funcionou.
    if (ids.baseline === 'S3_pre') {
      const vendidoPre = _getVendasLoja(ld, ids.baseline);
      const vendidoPos = _getVendasLoja(ld, ids.avaliada);
      baseline = vendidoPre;
      resultado = vendidoPos;
      unidade = 'R$';
      if (vendidoPre > 0 && vendidoPos > 0) {
        const variacao = (vendidoPos - vendidoPre) / vendidoPre * 100;
        deltaStr = (variacao >= 0 ? '+' : '') + variacao.toFixed(0) + '% vs antes do app';
        // Reaproveita thresholds de vendas_individuais (15% / 5%)
        const thr = DEFAULT_THRESHOLDS.vendas_individuais;
        if (variacao >= thr.funcionou) status = 'funcionou';
        else if (variacao >= thr.parcial) status = 'parcial';
        else status = 'nao_funcionou';
      }
    } else {
      const vendido = _getVendasLoja(ld, ids.avaliada);
      const meta = _getMetaSem(ld, ids.avaliada);
      baseline = meta;
      resultado = vendido;
      unidade = 'R$';
      if (meta > 0 && vendido > 0) {
        const pctBatido = vendido / meta * 100;
        deltaStr = pctBatido.toFixed(0) + '% da meta';
        if (pctBatido >= th.funcionou) status = 'funcionou';
        else if (pctBatido >= th.parcial) status = 'parcial';
        else status = 'nao_funcionou';
      }
    }
  }
  else if (sug.meta_alvo === 'marcas_a') {
    const alvo = sug.escopo === 'vendedora' && sug.vendedora ? sug.vendedora : '__loja__';
    if (alvo === '__loja__') {
      baseline = _getMA(ld, ids.baseline, '__loja__');
      resultado = _getMA(ld, ids.avaliada, '__loja__');
    } else {
      // Vendedora: marcasA_indiv é média do mês — não tem versão por semana.
      // Usar como aproximação único valor disponível.
      baseline = _getMA(ld, null, alvo);
      resultado = _getMA(ld, null, alvo);
      return {tipo:'estimativa_individual', meta_alvo:'marcas_a', vendedora:sug.vendedora, valor_medio_mes:baseline};
    }
    unidade = '%';
    if (baseline !== null && resultado !== null) {
      const deltaPP = resultado - baseline;
      deltaStr = (deltaPP >= 0 ? '+' : '') + deltaPP.toFixed(1) + 'pp';
      if (deltaPP >= th.funcionou) status = 'funcionou';
      else if (deltaPP >= th.parcial) status = 'parcial';
      else status = 'nao_funcionou';
    }
  }

  return {
    tipo:'calculado',
    meta_alvo: sug.meta_alvo,
    baseline, resultado, status, deltaStr, unidade,
    threshold: th,
    sem_baseline: ids.baseline,
    sem_avaliada: ids.avaliada,
  };
}

// Personaliza por: meta_alvo, status (funcionou/parcial/nao), escopo (vendedora/loja),

function gerarMensagemFeedback(sug, m) {
  if (!m || m.tipo !== 'calculado' || m.status === null) return null;
  const nome = sug.vendedora ? sug.vendedora.split(' ')[0] : null;

  const isWeekendComparison = m.sem_baseline === 'S3_pre';

  if (sug.meta_alvo === 'vendas_individuais' && nome) {
    if (m.status === 'funcionou') {
      return `${nome}, suas vendas cresceram ${m.deltaStr} depois que o app começou ` +
        `(${fmtR(m.baseline)} → ${fmtR(m.resultado)}). Excelente trabalho! ` +
        `Continua nessa pegada — as técnicas que você usou essa semana estão funcionando.`;
    }
    if (m.status === 'parcial') {
      return `${nome}, suas vendas subiram ${m.deltaStr} essa semana ` +
        `(${fmtR(m.baseline)} → ${fmtR(m.resultado)}). Tá no caminho — ` +
        `pra subir mais, foca em oferecer Marcas A já na primeira sugestão ao cliente.`;
    }

      `aconteceu — pode ser escala, cliente, ou ajuste de abordagem. A próxima semana é nova.`;
  }

  if (sug.meta_alvo === 'atingir_meta' && isWeekendComparison) {

    if (m.status === 'funcionou') {
      return `Equipe da ${lojaLabel}: o final da semana fechou com crescimento de ` +
        `${m.deltaStr.replace(' vs antes do app','')} comparado ao início da semana ` +
        `(${fmtR(m.baseline)} → ${fmtR(m.resultado)}). Vocês reagiram juntas — ` +
        `vamos manter esse ritmo na próxima!`;
    }
    if (m.status === 'parcial') {
      return `Equipe da ${lojaLabel}: o final da semana ficou ${m.deltaStr.replace(' vs antes do app','')} ` +
        `vs o início (${fmtR(m.baseline)} → ${fmtR(m.resultado)}). Crescemos, mas dá pra mais — ` +
        `na próxima semana foco em oferecer Marca A pra todo cliente novo já no primeiro contato.`;
    }
    return `Equipe da ${lojaLabel}: o final da semana ficou ${m.deltaStr.replace(' vs antes do app','')} ` +
      `(${fmtR(m.baseline)} → ${fmtR(m.resultado)}). Vamos conversar na reunião de segunda ` +
      `pra entender o que travou — e ajustar a abordagem.`;
  }

  if (sug.meta_alvo === 'marcas_a' && sug.escopo === 'loja') {
    const lojaLabel = LOJAS_BASE[sug.loja]?.nome || sug.loja;
    if (m.status === 'funcionou') {
      return `Equipe da ${lojaLabel}: % de Marcas A subiu ${m.deltaStr} (${m.baseline?.toFixed(1)}% → ${m.resultado?.toFixed(1)}%). ` +
        `Vocês entenderam a estratégia — continua oferecendo marca A primeiro!`;
    }
    if (m.status === 'parcial') {
      return `Equipe da ${lojaLabel}: % Marcas A subiu ${m.deltaStr} (${m.baseline?.toFixed(1)}% → ${m.resultado?.toFixed(1)}%). ` +
        `Tá subindo — pra atingir os 30% e destravar +R$50 no prêmio, intensificar combo de 3 produtos.`;
    }
    return `Equipe da ${lojaLabel}: % Marcas A em ${m.resultado?.toFixed(1)}% (era ${m.baseline?.toFixed(1)}%). ` +
      `Precisamos rever a abordagem — sugestão: monte mesa de destaque com Marcas A na entrada e oriente a equipe.`;
  }

  return null;
}

function copiarMensagemFb(idSug, btn) {
  const el = document.getElementById('msg-fb-' + idSug);

  const txt = el.innerText;

    btn.style.color = 'var(--green)';

}

function _supaHeaders(extra) {

// Upsert das metas ajustadas (uma linha por semana). Chamado em setDecisaoMeta.
async function salvarMetasSupabase(mes, loja, metas) {

    });

// ── Camada genérica Supabase (escrita-dupla + leitura com fallback) ──
// Escrita: grava no Supabase (durável) E no Worker → nada se perde.
// Leitura: junta os dois (dedup por chave, registro mais recente vence) →
// durante a transição nenhum dado some, mesmo o que ainda só está no Worker.
async function supaUpsert(table, rows, onConflict) {
  const arr = Array.isArray(rows) ? rows : [rows];
  if (!arr.length) return false;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}` + (onConflict ? `?on_conflict=${onConflict}` : ''), {
      method: 'POST', headers: _supaHeaders({Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(arr)
    });
    return r.ok;
  } catch(e) { console.warn(`[supa ${table}] upsert falhou:`, e); return false; }
}
async function supaSelect(table, query) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${query || 'select=*'}`, {headers: _supaHeaders(), cache: 'no-store'});
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { console.warn(`[supa ${table}] select falhou:`, e); return null; }
}
// Junta itens do Worker + Supabase, dedup por keyFn, mais recente (em) vence.
function mergeItens(workerItems, supaItems, keyFn) {
  const map = new Map();
  for (const it of (workerItems || [])) map.set(keyFn(it), it);
  for (const it of (supaItems || [])) {
    const k = keyFn(it), cur = map.get(k);
    if (!cur || new Date(it.em||0) >= new Date(cur.em||0)) map.set(k, it);
  }
  return [...map.values()];
}

// Lê todas as metas do mês. Aplica em DADOS (Supabase é autoritativo).
async function lerEAplicarMetasSupabase(mes) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/metas_semanais?mes=eq.${mes}&select=loja,semana,meta`, {headers: _supaHeaders(), cache: 'no-store'});
    if (!r.ok) return false;
    const rows = await r.json();
    if (!Array.isArray(rows) || !rows.length) return false;
    for (const row of rows) {
      const ld = DADOS[mes]?.[row.loja];
      if (ld && Array.isArray(ld.semanas)) {
        const sem = ld.semanas.find(s => s.id === row.semana);
        if (sem && typeof row.meta === 'number') sem.meta = row.meta;
      }
    }
    return true;
  } catch(e) { console.warn('[supa metas] leitura falhou:', e); return false; }
}

  supaUpsert('sugestoes_overrides', {id_sugestao: idSug, status: reg.status, texto_editado: reg.texto_editado||null, prazo: reg.prazo||null, em: new Date().toISOString()}, 'id_sugestao');
  try {
    await fetch(`${WORKER_URL}/override`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id_sugestao: idSug, ...reg})
    });
  } catch (e) {
    console.warn('[override] falha de envio - fica em localStorage:', e);
  }
}

function aprovarSugestao(idSug, textoEditado, prazo) {
  const ov = loadSugestoesOverrides();
  const reg = {
    status: 'aprovada',
    texto_editado: textoEditado || null,
    prazo: prazo || null,
    em: new Date().toISOString()
  };
  ov[idSug] = reg;
  localStorage.setItem('sugestoes_overrides', JSON.stringify(ov));
  enviarOverrideWorker(idSug, reg);
  rerender();
}

function aprovarComPrazo(idSug) {
  const card = document.querySelector(`.sug-card[data-id="${idSug}"]`);
  if (!card) return aprovarSugestao(idSug);
  const sel = card.querySelector('.prazo-select');
  const prazo = sel ? sel.value : null;
  const editor = card.querySelector('.sug-editor');
  let texto = null;
  if (editor && editor.style.display === 'block') {
    texto = editor.querySelector('textarea').value.trim();
    if (!texto) return alert('Texto não pode ficar vazio');
  }
  aprovarSugestao(idSug, texto, prazo);
}

function toggleFeedbacks(idSug) {
  const el = document.getElementById('fbs-' + idSug);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function rejeitarSugestao(idSug) {
  const ov = loadSugestoesOverrides();
  const reg = {status: 'rejeitada', em: new Date().toISOString()};
  ov[idSug] = reg;
  localStorage.setItem('sugestoes_overrides', JSON.stringify(ov));
  enviarOverrideWorker(idSug, reg);
  rerender();
}

function voltarSugestaoPendente(idSug) {
  const ov = loadSugestoesOverrides();
  delete ov[idSug];
  localStorage.setItem('sugestoes_overrides', JSON.stringify(ov));
  // No Worker, manda status pendente
  enviarOverrideWorker(idSug, {status: 'pendente', em: new Date().toISOString()});
  rerender();
}

function toggleEditor(idSug) {
  const card = document.querySelector(`.sug-card[data-id="${idSug}"]`);
  if (!card) return;
  const editor = card.querySelector('.sug-editor');
  editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
  if (editor.style.display === 'block') editor.querySelector('textarea').focus();
}

function salvarEdicao(idSug) {
  const card = document.querySelector(`.sug-card[data-id="${idSug}"]`);
  const texto = card.querySelector('.sug-editor textarea').value.trim();
  if (!texto) return alert('Texto não pode ficar vazio');
  aprovarSugestao(idSug, texto);
}

function aprovarTodasDaSemana() {
  const semKey = getSemanaCorrente();
  const sem = SUGESTOES[semKey];
  if (!sem) return;
  const ov = loadSugestoesOverrides();
  sem.itens.forEach(s => {
    const eff = ov[s.id]?.status || s.status || 'pendente';
    if (eff === 'pendente') {
      ov[s.id] = {status: 'aprovada', texto_editado: null, em: new Date().toISOString()};
    }
  });
  localStorage.setItem('sugestoes_overrides', JSON.stringify(ov));
  rerender();
}

function agruparPor(getKey) {
  // Junta TODAS as sugestões já lançadas (de todas as semanas) com avaliação preenchida
  const avalMap = loadAvaliacoes();
  const buckets = {}; // key -> {func, indif, nao}
  Object.values(SUGESTOES).forEach(sem => {
    sem.itens.forEach(s => {
      const a = avalMap[s.id];
      if (!a) return;
      const key = getKey(s);
      if (!key) return;
      const arr = Array.isArray(key) ? key : [key];
      arr.forEach(k => {
        if (!buckets[k]) buckets[k] = {func:0, indif:0, nao:0};
        if (a.resultado === 'funcionou') buckets[k].func++;
        else if (a.resultado === 'indiferente') buckets[k].indif++;
        else if (a.resultado === 'nao_funcionou') buckets[k].nao++;
      });
    });
  });
  return buckets;
}

function renderChartCard(titulo, subtitulo, buckets, labelFn) {
  const entries = Object.entries(buckets).map(([k,v]) => {
    const tot = v.func + v.indif + v.nao;
    const score = tot > 0 ? (v.func*100 + v.indif*50) / tot : 0; // 0-100
    return [k, v, tot, score];
  }).sort((a,b) => b[3] - a[3] || b[2] - a[2]);
  if (entries.length === 0) {
    return `<div class="chart-card"><h3>${titulo}</h3><div class="chart-sub">${subtitulo}</div>
      <div style="color:var(--muted);text-align:center;padding:20px 0;font-size:12px">Ainda sem avaliações nessa categoria</div>
    </div>`;
  }
  const maxTot = Math.max(...entries.map(e => e[2]));
  const rows = entries.map(([k,v,tot,score]) => {
    const fW = tot>0 ? v.func/tot*100 : 0;
    const iW = tot>0 ? v.indif/tot*100 : 0;
    const nW = tot>0 ? v.nao/tot*100 : 0;
    const scoreCls = score>=70?'score-high':score>=40?'score-mid':'score-low';
    const widthOuter = maxTot > 0 ? tot/maxTot*100 : 0;
    return `<div class="bar-row">
      <div class="lbl" title="${labelFn(k)}">${labelFn(k)}</div>
      <div class="bar-track" style="max-width:${widthOuter}%">
        ${fW>0?`<div class="bar-seg func" style="width:${fW}%" title="${v.func} funcionou">${v.func>0?v.func:''}</div>`:''}
        ${iW>0?`<div class="bar-seg indif" style="width:${iW}%" title="${v.indif} indiferente">${v.indif>0?v.indif:''}</div>`:''}
        ${nW>0?`<div class="bar-seg nao" style="width:${nW}%" title="${v.nao} não funcionou">${v.nao>0?v.nao:''}</div>`:''}
      </div>
      <span class="score-badge ${scoreCls}">${Math.round(score)}</span>
      <div class="tot">${tot}</div>
    </div>`;
  }).join('');
  return `<div class="chart-card">
    <h3>${titulo}</h3>
    <div class="chart-sub">${subtitulo}</div>
    ${rows}
  </div>`;
}

function _quantile(arr, q) {
  const a = [...arr].sort((x,y)=>x-y);
  const pos = (a.length - 1) * q;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  if (lo === hi) return a[lo];
  return a[lo] + (a[hi] - a[lo]) * (pos - lo);
}

  const cardSazonal = renderAnaliseSazonal();

  // Recentes (últimas 10)
  const recents = [];
  Object.values(SUGESTOES).forEach(sem => {

  recents.sort((a,b) => (b.a.avaliado_em||'').localeCompare(a.a.avaliado_em||''));
  const recentsHtml = recents.slice(0, 10).map(({s,a}) => {
    const cor = a.resultado==='funcionou'?'var(--green)':a.resultado==='indiferente'?'var(--muted)':'var(--red)';
    return `<div class="rec-row">

async function initDashboard() {
  // Retornos REAIS (aprovados) começam vazios — só são populados via Worker.
  // Textos sugeridos (rascunhos) ficam separados em TEXTOS_SUGERIDOS_RETORNO
  // e só pre-fill o textarea na UI (não contam como retorno aprovado).
  window.__FEEDBACK_RETORNOS = [];
  window.__TEXTOS_SUGERIDOS = TEXTOS_SUGERIDOS_RETORNO;
  setMes(curMes); // sincroniza seletor + cabeçalho com o mês corrente e renderiza
  // Em paralelo busca tudo do Worker
  try {
    const [oR, aR, fR, rR, mR,
           oS, aS, fS, rS] = await Promise.all([
      fetch(`${WORKER_URL}/overrides`, {cache: 'no-store'}),
      fetch(`${WORKER_URL}/avaliacoes`, {cache: 'no-store'}),
      fetch(`${WORKER_URL}/feedbacks`, {cache: 'no-store'}),
      fetch(`${WORKER_URL}/feedback-retornos`, {cache: 'no-store'}).catch(() => ({json: async () => ({items:[]})})),
      fetch(`${WORKER_URL}/metas-loja`, {cache: 'no-store'}).catch(() => ({json: async () => ({items:[]})})),
      // Supabase em paralelo (cada um null se falhar/tabela não existe ainda)
      supaSelect('sugestoes_overrides'),
      supaSelect('sugestoes_avaliacoes'),
      supaSelect('feedbacks'),
      supaSelect('feedback_retornos'),
    ]);
    // Junta Worker + Supabase (mais recente vence) → nada some na transição.
    const overrides  = mergeItens((await oR.json()).items, oS, x => x.id_sugestao);
    const avaliacoes = mergeItens((await aR.json()).items, aS, x => x.id_sugestao);
    const feedbacks  = mergeItens((await fR.json()).items, fS, x => `${x.id_sugestao}|${x.loja}|${x.vendedora}`);
    const retornos   = mergeItens((await rR.json()).items, rS, x => `${x.id_sugestao}|${x.loja}|${x.vendedora}`);
    const metasLoja  = (await mR.json()).items || [];

    // ── AJUSTES DE META (compartilhados via Worker) ──
    // O Worker é a fonte da verdade dos ajustes de meta: recebe tanto os que o
    // Athila faz no painel (setDecisaoMeta POSTa) quanto os que o agente
    // sincroniza. Aplicamos por cima do DADOS (por semana, Worker vence) e
    // espelhamos no localStorage pra o estado da UI (botão resetar) bater.
    // Sem isso, um ajuste feito em outro dispositivo (ou pelo agente) não
    // aparecia neste navegador — só o localStorage local valia.
    aplicarMetasWorkerNoDADOS(metasLoja);
    // Supabase é AUTORITATIVO — aplicado por último, vence Worker e localStorage.
    await lerEAplicarMetasSupabase(curMes);
    // Retornos aprovados vêm SÓ do Worker — sem mistura com sugestões.
    window.__FEEDBACK_RETORNOS = retornos;

    // Mescla overrides no localStorage (mantém também o que ele fez localmente)
    const localOv = JSON.parse(localStorage.getItem('sugestoes_overrides') || '{}');
    for (const o of overrides) {
      if (!localOv[o.id_sugestao] || new Date(o.em) > new Date(localOv[o.id_sugestao].em||0)) {
        localOv[o.id_sugestao] = {status:o.status, texto_editado:o.texto_editado, prazo:o.prazo, em:o.em};
      }
    }
    localStorage.setItem('sugestoes_overrides', JSON.stringify(localOv));

    // Mescla avaliações
    const localAv = JSON.parse(localStorage.getItem('avaliacoes_premiacao') || '[]');
    for (const a of avaliacoes) {
      const idx = localAv.findIndex(x => x.id_sugestao === a.id_sugestao);
      if (idx < 0) localAv.push(a); else if (new Date(a.em||0) > new Date(localAv[idx].em||localAv[idx].avaliado_em||0)) localAv[idx] = {...a, avaliado_em: (a.em||'').slice(0,10)};
    }
    localStorage.setItem('avaliacoes_premiacao', JSON.stringify(localAv));

    // Anexa feedbacks por sugestão (em memória, pra render mostrar)
    for (const sem of Object.values(SUGESTOES)) {
      if (!sem.itens) continue;
      for (const item of sem.itens) {
        item.feedbacks = feedbacks.filter(f => f.id_sugestao === item.id);
      }
    }

    rerender(); // re-render com dados frescos
  } catch (e) {
    console.warn('[init] worker fetch falhou - usando dados inline/localStorage:', e);
  }
}

initDashboard();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      setInterval(() => reg.update(), 60000);
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('[SW] versao nova detectada, atualizando...');
            setTimeout(() => location.reload(), 1500);
          }
        });
      });
    }).catch(e => console.warn('[SW] falha registro:', e));
  });
}
</script>

<script>
// Auto-update check: detecta mudanca via Last-Modified header (mais confiavel que SW)
(function(){
  let lastModified = null;
  async function checkUpdate() {
    try {
      const r = await fetch(location.pathname + '?_=' + Date.now(), {method:'HEAD', cache:'no-store'});
      const lm = r.headers.get('last-modified');
      if (!lm) return;
      if (lastModified === null) { lastModified = lm; return; }
      if (lm !== lastModified) {
        console.log('[auto-update] nova versao detectada');
        location.reload();
      }
    } catch(e) {}
  }
  window.addEventListener('load', () => {
    setTimeout(checkUpdate, 5000);
    setInterval(checkUpdate, 30000);
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) checkUpdate();
  });
})();
</script>
