<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planejamento de Compras — A.M. Gomes</title>
<style>
:root{
  --bg:#f0f4f8; --card:#ffffff; --card2:#f8fafc; --border:#e2e8f0;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.04);
  --shadow-hover:0 4px 12px rgba(15,23,42,.10),0 8px 28px rgba(15,23,42,.06);
  --text:#0f172a; --text2:#334155; --muted:#64748b; --muted2:#94a3b8;
  --accent:#6366f1; --ok:#059669; --warn:#d97706; --crit:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent)}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow)}
header h1{font-size:19px;font-weight:800;margin:0;letter-spacing:-.4px}
.who{margin-left:auto;color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:10px}
nav{display:flex;gap:6px;padding:12px 22px;flex-wrap:wrap}
nav button{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 15px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:var(--shadow)}
nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
nav .badge{background:var(--crit);color:#fff;border-radius:10px;padding:1px 7px;margin-left:6px;font-size:11px}
main{padding:6px 22px 40px;max-width:96vw}
.card{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
h2{font-size:14px;margin:0 0 14px;font-weight:800}
label{display:block;font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px}
input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:9px;font-size:14px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px}
.btn.sec{background:var(--card2);border:1px solid var(--border);color:var(--text2)}
.btn.ok{background:var(--ok)} .btn.bad{background:var(--crit)}
.btn.mini{padding:5px 10px;font-size:11.5px;border-radius:7px}
td.acoes{position:sticky;right:0;background:var(--card);box-shadow:-6px 0 8px -6px rgba(15,23,42,.18)}
th.acoes{position:sticky;right:0;background:var(--card)}
.totalrow td.acoes,tr.totalrow td.acoes{background:var(--card2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:3px 8px;border-bottom:1px solid var(--border);white-space:nowrap;line-height:1.3}
th{color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.s-ATHILA{background:#fef3c7;color:#92400e} .s-ENVIADO{background:#e0e7ff;color:#3730a3}
.s-FATURADO{background:#f3e8ff;color:#6b21a8} .s-ENTREGUE{background:#d1fae5;color:#065f46}
.s-REJEITADO{background:#fee2e2;color:#991b1b}
.s-APROVADO{background:#ffedd5;color:#9a3412}
.row-alerta td{background:#fff7ed}
.row-alerta td:first-child{box-shadow:inset 4px 0 0 var(--warn)}
.row-alerta td.acoes{background:#fff7ed}
.alerta-box{background:#fff7ed;border:1px solid #fed7aa;border-left:4px solid var(--warn);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:#9a3412;font-weight:600}
.badge.warn{background:var(--warn)}
.neg{color:var(--crit);font-weight:800} .pos{color:var(--ok);font-weight:700}
.mut{color:var(--muted)} .right{text-align:right}
.lojahead{font-weight:800;color:var(--accent);margin:18px 0 6px;font-size:13px}
.split-preview{font-size:12px;color:var(--muted);margin-top:8px}
.totalrow{background:var(--card2);font-weight:800}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 18px;border-radius:10px;opacity:0;transition:.3s;z-index:50;box-shadow:var(--shadow-hover)}
.toast.show{opacity:1}
#login{max-width:380px;margin:8vh auto;text-align:center}
#login .card{border-top-color:var(--accent)}
.hide{display:none}
</style>
</head>
<body>

<div id="login" class="hide">
  <div class="card">
    <h1 style="font-size:20px;margin:0 0 4px">🛒 Planejamento de Compras</h1>
    <p class="mut" style="margin:0 0 18px">A.M. Gomes — acesso da equipe</p>
    <label style="text-align:left">E-mail</label>

</div>

<div id="app" class="hide">
  <header>
    <h1>🛒 Planejamento de Compras</h1>
    <span class="who"><span id="who"></span></span>
  </header>
  <nav id="nav"></nav>
  <div id="toolbar" style="padding:0 22px 10px;color:var(--muted);font-size:12.5px;font-weight:700"></div>

</div>

<div class="toast" id="toast"></div>
<div id="vupd" style="display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;background:var(--accent);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:var(--shadow-hover)">🔄 Nova versão disponível <button onclick="location.href=location.pathname+'?v='+Date.now()" style="margin-left:10px;background:#fff;color:var(--accent);border:none;padding:5px 12px;border-radius:7px;font-weight:800;cursor:pointer">Atualizar agora</button></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
var SUPABASE_URL = 'https://valhewbvjwdkkvuejrxa.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhbGhld2J2andka2t2dWVqcnhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzEwMTgsImV4cCI6MjA5NzMwNzAxOH0.DhQaFpQ1Ca-W8Od6jl3KatGai_shXOoc14Fqk7P3lK4';
var OWNER_EMAIL = 'athilamgomes@gmail.com';
var WEB3FORMS_KEY = '65791c8f-eab3-4e7a-91bf-ce645c273332';  // avisa o aprovador por e-mail ao lançar (web3forms.com)
/* ================================================== */

var LOJAS=[{id:'ALTAMIRA',nome:'Altamira (L1+L4)'},{id:'ITAITUBA',nome:'Itaituba (L3)'},{id:'SANTAREM',nome:'Santarém (L5)'}];
var MARCA_ALIAS={'GAMA':['BRASITECH']}; // pedido marca (UPPER) → outras marcas de NF que também são desta marca (fornecedor que fatura com nome diferente)
var STATUS=['ATHILA','APROVADO','ENVIADO','FATURADO','ENTREGUE','REJEITADO'];
var STATUS_COMPROMETE=['ENVIADO','FATURADO','ENTREGUE'];   // OTB
var STATUS_A_PAGAR=['ENVIADO','FATURADO']; // em trânsito: já comprometeram o caixa. APROVADO NÃO entra (aprovado mas ainda não enviado — só conta quando vira ENVIADO). ATHILA=não aprovado, ENTREGUE=já recebido.

var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var DB={email:'',isOwner:false,pedidos:[],limites:[],meses:[],otb:{}};

var BUILD='ORD-17'; // versão da página — incrementar a cada deploy; serve de selo e de checagem de auto-update

function lojasVisiveis(){ return FILTRO_LOJA==='TODAS'?LOJAS:LOJAS.filter(function(l){return l.id===FILTRO_LOJA;}); }
function pedidosVisiveis(){ return FILTRO_LOJA==='TODAS'?DB.pedidos:DB.pedidos.filter(function(p){return p.loja===FILTRO_LOJA;}); }
function setFiltro(v){ FILTRO_LOJA=v; render(); }
function setFiltroMarca(v){ FILTRO_MARCA=v; render(); }
function marcasDistintas(){ var s={}; DB.pedidos.forEach(function(p){ if(p.marca)s[p.marca]=1; }); return Object.keys(s).sort(); }
function passaMarca(p){ return FILTRO_MARCA==='TODAS'||p.marca===FILTRO_MARCA; }
function janela6(){ var h=new Date(),a=[]; for(var i=0;i<6;i++){var d=new Date(h.getFullYear(),h.getMonth()+i,1);a.push(d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));} return a; }

function brl(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function el(id){return document.getElementById(id);}
function toast(m){var t=el('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
function nomeMes(m){var p=m.split('-');var nm=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return nm[+p[1]-1]+'/'+p[0].slice(2);}
function mesExtenso(m){if(m==='0000-00')return 'Sem data';var p=m.split('-');var nm=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];return nm[+p[1]-1]+'/'+p[0];}
function lojaNome(id){var x=LOJAS.filter(function(l){return l.id===id;})[0];return x?x.nome:id;}
function fmtData(s){var m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+'/'+m[2]+'/'+m[1]:(s||'');}
function hojeISO(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function diasEntre(a,b){a=String(a||'').slice(0,10);b=String(b||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(a)||!/^\d{4}-\d{2}-\d{2}$/.test(b))return null;return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);}
function deltaTxt(a,b){var n=diasEntre(a,b);return n==null?'':' <span class="mut" style="font-size:10px">'+(n>=0?'+':'')+n+'d</span>';}

/* ---------- auth ---------- */
function getNome(){ return localStorage.getItem('pc_nome')||''; }
function setNome(v){ localStorage.setItem('pc_nome',v||''); DB.email=(v||'equipe'); }
window.addEventListener('DOMContentLoaded', function(){
  /* LOGIN DESATIVADO temporariamente — acesso livre. Identidade = nome digitado (sem senha). */
  DB.email=getNome()||'equipe'; DB.isOwner=true;
  el('login').classList.add('hide'); el('app').classList.remove('hide');
  el('who').innerHTML='Você: <input value="'+getNome()+'" placeholder="seu nome" style="width:130px;padding:4px 8px;display:inline-block" onchange="setNome(this.value)"> · <span style="color:var(--warn)">login desativado</span> · <span class="mut" title="versão da página">build '+BUILD+'</span>';
  carregar();
  checkVersion(); setInterval(checkVersion,300000); window.addEventListener('focus',checkVersion); // auto-update: avisa quando sair versão nova
});
function checkVersion(){
  fetch(location.pathname+'?vc='+Date.now(),{cache:'no-store'}).then(function(r){return r.text();}).then(function(t){
    var m=t.match(/var BUILD=['"](ORD-\d+)['"]/);
    if(m&&m[1]!==BUILD){ var e=el('vupd'); if(e)e.style.display='block'; }
  }).catch(function(){});
}
async function entrar(){
  el('lg_err').textContent='';
  var email=el('lg_email').value.trim(), pass=el('lg_pass').value;
  var {data,error}=await sb.auth.signInWithPassword({email:email,password:pass});
  if(error){ el('lg_err').textContent=error.message; return; }
  start(data.user);
}
async function sair(){ await sb.auth.signOut(); location.reload(); }
function start(user){
  DB.email=(user.email||'').toLowerCase();
  DB.isOwner=DB.email===OWNER_EMAIL.toLowerCase();
  el('login').classList.add('hide'); el('app').classList.remove('hide');
  el('who').textContent=DB.email+(DB.isOwner?' · aprovador':'');
  carregar();
}

/* ---------- dados ---------- */
function mesesHorizonte(){
  var hoje=new Date(), arr=[], base=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
  for(var i=0;i<14;i++){var d=new Date(base.getFullYear(),base.getMonth()+i,1);arr.push(d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));}
  return arr;
}
async function carregar(){
  el('main').innerHTML='<div class="card">Carregando…</div>';
  var [pr,lr]=await Promise.all([
    sb.from('pedidos').select('*'),
    sb.from('limites').select('*')
  ]);
  if(pr.error){ el('main').innerHTML='<div class="card">Erro: '+pr.error.message+'</div>'; return; }
  DB.pedidos=(pr.data||[]).map(function(p){ if(typeof p.distribuicao==='string'){try{p.distribuicao=JSON.parse(p.distribuicao);}catch(e){p.distribuicao={};}} return p; });
  DB.limites=lr.data||[];
  await recomputarPendentes();   // rolling do prazo dos pedidos ATHILA a partir de hoje
  DB.meses=mesesHorizonte();
  DB.otb=computeOTB(DB.pedidos,DB.limites);
  DB.realizado=null; DB.realizadoEm='';
  try{
    var rr=await fetch('https://athilamgomes-ui.github.io/dashboard-compras-amgomes/dados.json',{cache:'no-store'});
    if(rr.ok){ var dd=await rr.json(); DB.realizado=montarRealizado(dd); DB.realizadoEm=dd.gerado_em||''; detectarFaturamentos(dd); await autoAvancarStatus(); }
  }catch(e){ DB.realizado=null; }
  DB.contasERP=null;
  try{
    var cr=await fetch('https://athilamgomes-ui.github.io/dashboard-equipe/dashboard_amgomes.html',{cache:'no-store'});
    if(cr.ok){ DB.contasERP=parseContasERP(await cr.text()); }
  }catch(e){ DB.contasERP=null; }
  render();
}
/* Lê o bloco CONTASPAGAR (faturas a pagar por vencimento, fonte ERP) do dashboard de vendas público.
   Usa só os arrays erpLx — a parte de planilha (planLx) é o que ESTE app substitui, então ignoramos. */
function parseContasERP(html){
  var seg=html.split('CONTASPAGAR_INICIO')[1]; if(!seg)return null; seg=seg.split('CONTASPAGAR_FIM')[0];
  function arr(n){var m=seg.match(new RegExp(n+'\\s*=\\s*\\[([^\\]]*)\\]'));return m?m[1].split(',').map(function(x){return Number(x.trim())||0;}):null;}
  var mm=seg.match(/meses\s*=\s*\[([^\]]*)\]/); if(!mm)return null;
  var labels=mm[1].split(',').map(function(x){return x.replace(/['"\s]/g,'');}).filter(Boolean);
  var e1=arr('erpL1'),e3=arr('erpL3'),e4=arr('erpL4'),e5=arr('erpL5'); if(!e1)return null;
  var fm=seg.match(/erp:\s*'([^']+)'/); var em=fm?fm[1]:'';
  var ab=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  var out={ALTAMIRA:{},ITAITUBA:{},SANTAREM:{},L1:{},L4:{}};
  labels.forEach(function(lbl,i){var p=lbl.toLowerCase().split('/');var mi=ab.indexOf(p[0]);if(mi<0)return;
    var k='20'+p[1]+'-'+('0'+(mi+1)).slice(-2);
    out.L1[k]=e1[i]||0; out.L4[k]=e4[i]||0;
    out.ALTAMIRA[k]=(e1[i]||0)+(e4[i]||0); out.ITAITUBA[k]=e3[i]||0; out.SANTAREM[k]=e5[i]||0;});
  return {dados:out, em:em};
}
function contasERPmes(m){
  var c=DB.contasERP&&DB.contasERP.dados; if(!c)return 0;
  if(FILTRO_LOJA!=='TODAS')return (c[FILTRO_LOJA]||{})[m]||0;
  return (c.ALTAMIRA[m]||0)+(c.ITAITUBA[m]||0)+(c.SANTAREM[m]||0);
}
/* ---------- recálculo do prazo dos pedidos PENDENTES (rolling a partir de hoje) ----------
   Opção A do usuário: enquanto ATHILA, os meses do prazo (30/60/90...) são contados a partir de
   HOJE e recalculados a cada abertura; ao APROVAR, congela na data da aprovação. */
function distIgual(a,b){a=a||{};b=b||{};var ka=Object.keys(a),kb=Object.keys(b);if(ka.length!==kb.length)return false;
  for(var i=0;i<ka.length;i++){var k=ka[i];if(!(k in b))return false;if(Math.round(a[k]||0)!==Math.round(b[k]||0))return false;}return true;}
async function recomputarPendentes(){
  var mudados=[];
  DB.pedidos.forEach(function(p){ if(p.status!=='ATHILA'&&p.status!=='APROVADO')return; // ainda não enviados rolam de hoje
    var nova=autoSplit(Number(p.valor_total)||0,p.prazo,p.parcelas,''); // base vazia = hoje
    if(!distIgual(p.distribuicao,nova)){ p.distribuicao=nova; mudados.push(p); } });
  if(mudados.length) try{ await Promise.all(mudados.map(function(p){return sb.from('pedidos').update({distribuicao:p.distribuicao}).eq('id',p.id);})); }catch(e){}
}
function celvBR(v){return v?Math.round(v).toLocaleString('pt-BR'):'';}
/* Pedidos comprometidos (ENVIADO+FATURADO = em trânsito), por mês, respeitando o filtro de loja.
   Fonte ÚNICA usada nos rodapés de Pedidos E Aprovações → o total é idêntico nas duas abas. */
function comprometidoMes(jan){
  var out={};
  DB.pedidos.forEach(function(p){
    if(STATUS_A_PAGAR.indexOf(p.status)<0)return;
    if(p._noERP)return; // FATURADO já lançado no ERP → entra só na linha do ERP, sem duplicar
    if(FILTRO_LOJA!=='TODAS'&&p.loja!==FILTRO_LOJA)return;
    if(!passaMarca(p))return;
    var d=p.distribuicao||{};
    jan.forEach(function(m){var v=Number(d[m])||0;if(v)out[m]=(out[m]||0)+v;});
  });
  return out;
}
/* Rodapé "contas a pagar geral" (IDÊNTICO nas abas Pedidos e Aprovações):
   pedidos em trânsito (enviado+faturado) + contas a pagar já no ERP = total comprometido. */
/* L=colspan do rótulo (colunas antes do Valor); G=colunas entre Valor e os meses; T=colunas após os meses.
   Aprovações usa (3,1,2); Pedidos usa (4,1,1) por ter colunas diferentes. Total sempre = L+1+G+6+T = 13. */
function footerPagar(jan,L,G,T){
  var TOTAL=L+1+G+6+T; // nº total de colunas da tabela (varia entre Pedidos e Aprovações)
  var comp=comprometidoMes(jan);
  var pedJan=jan.reduce(function(s,m){return s+(comp[m]||0);},0);
  var fGp=jan.map(function(m){return '<td class="num">'+celvBR(comp[m])+'</td>';}).join('');
  var lblTransito=FILTRO_MARCA==='TODAS'?'Pedidos em trânsito (enviado + faturado)':'Pedidos em trânsito — '+FILTRO_MARCA;
  var h='<tr class="totalrow" style="border-top:3px solid var(--accent)"><td colspan="'+L+'" class="right">'+lblTransito+'</td><td class="num">'+brl(pedJan)+'</td><td colspan="'+G+'"></td>'+fGp+'<td colspan="'+T+'"></td></tr>';
  if(FILTRO_MARCA!=='TODAS'){
    h+='<tr><td colspan="'+TOTAL+'" class="mut" style="padding-top:6px;font-size:11px">ℹ️ Filtrando por marca — o "Contas a pagar no ERP" é por loja (não por marca), então o TOTAL COMPROMETIDO completo aparece só com <b>Todas as marcas</b>.</td></tr>';
  } else if(DB.contasERP){
    var erpJan=jan.reduce(function(s,m){return s+contasERPmes(m);},0);
    var fEp=jan.map(function(m){return '<td class="num mut">'+celvBR(contasERPmes(m))+'</td>';}).join('');
    var fTt=jan.map(function(m){return '<td class="num"><b>'+celvBR((comp[m]||0)+contasERPmes(m))+'</b></td>';}).join('');
    h+='<tr class="totalrow"><td colspan="'+L+'" class="right mut">+ Contas a pagar já no ERP (vencimento'+(DB.contasERP.em?' · ERP '+DB.contasERP.em:'')+')</td><td class="num mut">'+brl(erpJan)+'</td><td colspan="'+G+'"></td>'+fEp+'<td colspan="'+T+'"></td></tr>'+
      '<tr class="totalrow" style="background:#eef2ff"><td colspan="'+L+'" class="right">= TOTAL COMPROMETIDO (trânsito + ERP)</td><td class="num"><b>'+brl(pedJan+erpJan)+'</b></td><td colspan="'+G+'"></td>'+fTt+'<td colspan="'+T+'"></td></tr>'+
      breakdownAltamira(jan,comp,L,G,T);
  } else {
    h+='<tr><td colspan="'+TOTAL+'" class="mut" style="padding-top:8px">Contas a pagar do ERP indisponível agora (não consegui ler o dashboard de vendas). Mostrando só os pedidos em trânsito.</td></tr>';
  }
  var nNoErp=DB.pedidos.filter(function(p){return p._noERP&&(FILTRO_LOJA==='TODAS'||p.loja===FILTRO_LOJA)&&passaMarca(p);}).length;
  if(nNoErp) h+='<tr><td colspan="'+TOTAL+'" class="mut" style="padding-top:6px;font-size:11px">ℹ️ '+nNoErp+' pedido(s) FATURADO já constam no ERP (faturas a pagar por vencimento) — contados só na linha do ERP, sem duplicar.</td></tr>';
  return h;

function breakdownAltamira(jan,comp,L,G,T){

  }
  return linha('L1','Casa Altamira')+linha('L4','MissBeleza Altamira');

function montarRealizado(dd){
  var ano=new Date().getFullYear();
  var mapLoja={L1:'ALTAMIRA',L4:'ALTAMIRA',L3:'ITAITUBA',L5:'SANTAREM'};
  var out={ALTAMIRA:{},ITAITUBA:{},SANTAREM:{}};
  (dd.marcas||[]).forEach(function(m){
    var cmr=m.compras_mensais_rs||{};
    Object.keys(cmr).forEach(function(lo){var alvo=mapLoja[lo];if(!alvo)return;
      Object.keys(cmr[lo]||{}).forEach(function(mesN){var mes=ano+'-'+('0'+mesN).slice(-2);
        out[alvo][mes]=(out[alvo][mes]||0)+(Number(cmr[lo][mesN])||0);});});
  });
  return out;
}
/* Cruza os pedidos ENVIADO com as NFs faturadas do ERP (chegadas_mes) por marca+loja.
   Anexa p._nfSug = NF mais recente encontrada → vira sugestão de "recalcular pela data do faturamento". */
function detectarFaturamentos(dd){
  var mapLoja={ALTAMIRA:['L1','L4'],ITAITUBA:['L3'],SANTAREM:['L5']};
  var cm=(dd&&dd.chegadas_mes)||{};
  function norm(s){return String(s||'').toUpperCase().trim();}
  DB.pedidos.forEach(function(p){
    delete p._noERP; delete p._dataFat; delete p._nfMatch; delete p._temLancada;
    if(p.status!=='ENVIADO'&&p.status!=='FATURADO'&&p.status!=='ENTREGUE')return; // faturamento só faz sentido p/ pedido já enviado
    var pm=norm(p.marca), pv=Number(p.valor_total)||0, lojas=mapLoja[p.loja]||[];
    var minData=String(p.data_enviado||p.data_pedido||'').slice(0,10); // NF (faturamento) NÃO pode ser anterior ao envio/lançamento
    var cand=[];
    lojas.forEach(function(L){ (cm[L]||[]).forEach(function(it){
      var dt=String(it.data||'').slice(0,10); if(!dt||(minData&&dt<minData))return;
      var nfM=norm(it.marca);
      var marcaMatch=pm&&pm!=='(SEM MARCA)'&&(nfM===pm||(MARCA_ALIAS[pm]&&MARCA_ALIAS[pm].indexOf(nfM)>=0)); // alias: ex. NF "Brasitech" casa com pedido "Gama"
      var valMatch=(nfM===''||nfM==='(SEM MARCA)')&&pv>0&&Math.abs((Number(it.valor)||0)-pv)/pv<=0.02; // valor SÓ vale quando a NF NÃO tem marca identificada (senão pega NF de outra marca por coincidência de valor)
      if(marcaMatch||valMatch) cand.push({it:it,dt:dt,mm:marcaMatch}); }); });
    if(!cand.length)return;
    cand.sort(function(a,b){ if(a.mm!==b.mm)return a.mm?-1:1; return b.dt.localeCompare(a.dt); }); // prioriza casamento por MARCA, depois mais recente
    var best=cand[0].it;
    p._dataFat=best.data; p._nfMatch=best; p._temLancada=(best.origem==='lancada'); // status pela origem da NF CERTA (não "qualquer candidata lançada")
    if(p.status==='FATURADO'&&best.origem==='lancada') p._noERP=true; // NF já lançada no ERP → não duplicar
  });
}
/* Avança o status pelo ERP: NF emitida (pendente) → FATURADO; NF lançada (deu entrada) → ENTREGUE.
   Recalcula as parcelas a partir da data de faturamento. Só avança (nunca regride). */
async function autoAvancarStatus(){
  var rank={ATHILA:0,APROVADO:1,ENVIADO:2,FATURADO:3,ENTREGUE:4,REJEITADO:-1};
  // agrupa pedidos não-terminais pela NF que reivindicam (1 NF fatura 1 pedido)
  var porNF={};
  DB.pedidos.forEach(function(p){ if(p._nfMatch&&(p.status==='ENVIADO'||p.status==='FATURADO')){ var nf=p._nfMatch.nf; (porNF[nf]=porNF[nf]||[]).push(p); } });
  var ups=[]; DB._autoAv=[];
  Object.keys(porNF).forEach(function(nf){
    var grupo=porNF[nf], nfObj=grupo[0]._nfMatch, nfVal=Number(nfObj.valor)||0;
    // dono da NF = pedido com valor mais PRÓXIMO do valor da NF (desempate por id) — estável entre cargas
    grupo.sort(function(a,b){ var da=Math.abs((Number(a.valor_total)||0)-nfVal), db=Math.abs((Number(b.valor_total)||0)-nfVal); if(da!==db)return da-db; return String(a.id).localeCompare(String(b.id)); });
    var p=grupo[0]; // só o dono avança por esta NF; os demais ficam como estão (a NF é deste)
    var alvo=p._temLancada?'ENTREGUE':'FATURADO';
    if(rank[alvo]<=rank[p.status])return;
    var nfDt=String(nfObj.data).slice(0,10);
    var valAntes=Number(p.valor_total)||0;
    var valDepois=nfVal>0?nfVal:valAntes; // ponto 3: valor do pedido passa a ser o valor da NF (qtd/preços podem ter mudado)
    var nova=autoSplit(valDepois,p.prazo,p.parcelas,nfDt); // parcelas a partir do faturamento, com o valor da NF
    DB._autoAv.push({marca:p.marca,loja:p.loja,de:p.status,para:alvo,nf:nf,data:nfDt,va:valAntes,vd:valDepois});
    p.status=alvo; p.distribuicao=nova; p.valor_total=valDepois;
    ups.push(sb.from('pedidos').update({status:alvo,distribuicao:nova,valor_total:valDepois}).eq('id',p.id));
  });
  if(ups.length){ try{ await Promise.all(ups); logAcao('auto_avancar_erp',DB._autoAv.map(function(a){return a.marca+'/'+a.loja+' '+a.de+'->'+a.para+(a.va!==a.vd?' R$'+a.va+'->'+a.vd:'');}).join(', ')); }catch(e){} }
}
function computeOTB(peds,lims){
  var meses=DB.meses, limMap={}, out={};
  lims.forEach(function(l){limMap[l.loja+'|'+l.mes]=Number(l.valor)||0;});
  LOJAS.forEach(function(lo){out[lo.id]={};meses.forEach(function(m){out[lo.id][m]={limite:limMap[lo.id+'|'+m]||0,comprometido:0,em_aprovacao:0};});});
  peds.forEach(function(p){
    if(p.status==='REJEITADO')return; var b=out[p.loja]; if(!b)return; var d=p.distribuicao||{};
    Object.keys(d).forEach(function(m){ if(!b[m])return; var v=Number(d[m])||0;
      if(STATUS_COMPROMETE.indexOf(p.status)>=0)b[m].comprometido+=v; else if(p.status==='ATHILA')b[m].em_aprovacao+=v; });
  });
  Object.keys(out).forEach(function(lo){Object.keys(out[lo]).forEach(function(m){var c=out[lo][m];
    c.comprometido=Math.round(c.comprometido*100)/100; c.em_aprovacao=Math.round(c.em_aprovacao*100)/100;
    c.disponivel=Math.round((c.limite-c.comprometido)*100)/100;
    c.disponivel_pos=Math.round((c.limite-c.comprometido-c.em_aprovacao)*100)/100;});});
  return out;
}
function autoSplit(valor,prazo,parcelas,dataBase){
  var txt=String(prazo||'').toUpperCase();
  var dias=(txt.match(/\d+/g)||[]).map(Number).filter(function(n){return n<=365;});
  if(!dias.length){ if(/AVISTA|VISTA|PIX|PAGO|DINHEIRO/.test(txt))dias=[0]; else {var n=parseInt(parcelas,10); if(n>0){dias=[];for(var i=1;i<=n;i++)dias.push(30*i);} else dias=[0];} }
  var b=dataBase?new Date(dataBase+'T12:00:00'):new Date();
  var cota=valor/dias.length, out={};
  dias.forEach(function(d){var v=new Date(b.getFullYear(),b.getMonth(),b.getDate()+d);var k=v.getFullYear()+'-'+('0'+(v.getMonth()+1)).slice(-2);out[k]=(out[k]||0)+cota;});
  var ks=Object.keys(out).sort(),soma=0; ks.forEach(function(k){out[k]=Math.round(out[k]*100)/100;soma+=out[k];});
  if(ks.length)out[ks[ks.length-1]]+=Math.round((valor-soma)*100)/100;
  return out;
}

async function aplicarFaturamento(id,dataNF){

  var {error}=await sb.from('pedidos').update({status:'FATURADO',distribuicao:dist}).eq('id',id);
  if(error){toast('Erro: '+error.message);return;}
  logAcao('faturar_erp',p.marca+' / '+p.loja+' (NF emit '+dataNF+')'); carregar();
}
function aprovar(id){toast('Aprovando…');mudaStatus(id,'APROVADO','aprovar');}
function rejeitar(id){if(!confirm('Rejeitar este pedido?'))return;mudaStatus(id,'REJEITADO','rejeitar');}

function renderOTB(){
  var html='<div class="card"><h2>Saldo disponível para comprometer (limite − comprometido)</h2>'+
    '<p class="mut" style="margin-top:-8px">Comprometido = ENVIADO/FATURADO/ENTREGUE. "Em aprovação" = pedidos ATHILA ainda não liberados.</p>';
  lojasVisiveis().forEach(function(lo){
    html+='<div class="lojahead">'+lo.nome+'</div><div style="overflow:auto"><table><tr><th>Mês</th><th class="num">Limite</th><th class="num">Comprometido</th><th class="num">Em aprovação</th><th class="num">Disponível</th><th class="num">Disp. se aprovar tudo</th></tr>';
    DB.meses.forEach(function(m){var c=(DB.otb[lo.id]||{})[m]||{limite:0,comprometido:0,em_aprovacao:0,disponivel:0,disponivel_pos:0};
      if(!c.limite&&!c.comprometido&&!c.em_aprovacao)return;
      html+='<tr><td>'+nomeMes(m)+'</td><td class="num">'+brl(c.limite)+'</td><td class="num">'+brl(c.comprometido)+'</td>'+
        '<td class="num mut">'+brl(c.em_aprovacao)+'</td><td class="num '+(c.disponivel<0?'neg':'pos')+'">'+brl(c.disponivel)+'</td>'+
        '<td class="num '+(c.disponivel_pos<0?'neg':'')+'">'+brl(c.disponivel_pos)+'</td></tr>';});
    html+='</table></div>';});
  el('main').innerHTML=html+'</div>';
}

/* ---------- Planejado x Realizado ---------- */
function renderReal(){
  if(!DB.realizado){ el('main').innerHTML='<div class="card">Não consegui carregar o "realizado" do dashboard de Compras agora. Recarregue a página (Cmd+Shift+R).</div>'; return; }
  var ano=new Date().getFullYear();
  var plan={ALTAMIRA:{},ITAITUBA:{},SANTAREM:{}};
  DB.pedidos.forEach(function(p){ if(p.status==='REJEITADO')return; var mp=mesDoPedido(p); if(mp.slice(0,4)!=String(ano))return; if(!plan[p.loja])return; plan[p.loja][mp]=(plan[p.loja][mp]||0)+(Number(p.valor_total)||0); });
  var html='<div class="card"><h2>Planejado × Realizado '+ano+'</h2>'+
    '<p class="mut" style="margin:-8px 0 12px;font-weight:600">Planejado = valor dos pedidos lançados aqui (por mês do pedido, exceto rejeitados). Realizado = NFs de compra que entraram no ERP, por mês de emissão (fonte: dashboard de Compras'+(DB.realizadoEm?' · '+DB.realizadoEm:'')+'). Δ = Realizado − Planejado.</p>';
  lojasVisiveis().forEach(function(lo){
    var meses={}; Object.keys(plan[lo.id]||{}).forEach(function(m){meses[m]=1;}); Object.keys(DB.realizado[lo.id]||{}).forEach(function(m){meses[m]=1;});
    var ks=Object.keys(meses).sort(); var tp=0,tr=0;
    html+='<div class="lojahead">'+lo.nome+'</div><div style="overflow:auto"><table><tr><th>Mês</th><th class="num">Planejado</th><th class="num">Realizado</th><th class="num">Δ (R$)</th><th class="num">Δ %</th></tr>';
    ks.forEach(function(m){ var pv=plan[lo.id][m]||0, rv=(DB.realizado[lo.id]||{})[m]||0; tp+=pv; tr+=rv; var d=rv-pv;
      html+='<tr><td>'+nomeMes(m)+'</td><td class="num">'+brl(pv)+'</td><td class="num">'+brl(rv)+'</td>'+
        '<td class="num '+(d<0?'neg':'pos')+'">'+brl(d)+'</td><td class="num '+(d<0?'neg':'pos')+'">'+(pv?((d>=0?'+':'')+Math.round(d/pv*100)+'%'):'—')+'</td></tr>'; });
    var td=tr-tp;
    html+='<tr class="totalrow"><td>TOTAL</td><td class="num">'+brl(tp)+'</td><td class="num">'+brl(tr)+'</td><td class="num '+(td<0?'neg':'pos')+'">'+brl(td)+'</td><td class="num '+(td<0?'neg':'pos')+'">'+(tp?((td>=0?'+':'')+Math.round(td/tp*100)+'%'):'—')+'</td></tr></table></div>';
  });
  el('main').innerHTML=html+'</div>';
}
function mesDoPedido(p){var m=String(p.data_pedido||'').match(/^(\d{4})-(\d{2})/);return m?m[1]+'-'+m[2]:'0000-00';}
/* chave de ordenação por data de lançamento (asc, sem-data por último) — usada em Pedidos e Aprovações */
function ordData(p){var d=String(p.data_pedido||'');return /^\d{4}-\d{2}-\d{2}/.test(d)?d:'9999-99-99';}
function renderPedidos(){
  var ps=pedidosVisiveis().filter(function(p){return p.status!=='ATHILA'&&passaMarca(p);}).sort(function(a,b){return ordData(a).localeCompare(ordData(b));});
  var jan=janela6();
  function celv(v){return v?Math.round(v).toLocaleString('pt-BR'):'';}
  var aEnviar=ps.filter(function(p){return p.status==='APROVADO';});
  var banner=aEnviar.length?'<div class="alerta-box">🔔 <b>'+aEnviar.length+'</b> pedido(s) APROVADO(S) aguardando ENVIO — envie ao fornecedor e mude o status para <b>ENVIADO</b> (só entram no total comprometido depois de enviados): '+aEnviar.map(function(p){return p.marca+' · '+lojaNome(p.loja);}).join('   |   ')+'</div>':'';
  var bannerFat=(DB._autoAv&&DB._autoAv.length)?'<div class="alerta-box" style="border-left-color:var(--ok);background:#ecfdf5;color:#065f46">✅ <b>'+DB._autoAv.length+'</b> pedido(s) atualizados automaticamente pelo ERP nesta carga (NF emitida→FATURADO, NF lançada→ENTREGUE; valor ajustado pelo da NF): '+DB._autoAv.map(function(a){return a.marca+' ('+lojaNome(a.loja)+') '+a.de+'→<b>'+a.para+'</b> · NF '+a.nf+' '+fmtData(a.data)+(a.va!==a.vd?' · valor '+brl(a.va)+'→<b>'+brl(a.vd)+'</b>':'');}).join('   |   ')+'</div>':'';
  var body='';
  ps.forEach(function(p){
    var conta=p.status!=='ENTREGUE'; var d=p.distribuicao||{};
    var mtds=jan.map(function(m){var v=conta?(Number(d[m])||0):0;return '<td class="num mut">'+celv(v)+'</td>';}).join('');
    var cEnv=p.data_enviado?fmtData(p.data_enviado)+deltaTxt(p.data_pedido,p.data_enviado):'—';
    var cFat=p._dataFat?fmtData(p._dataFat)+deltaTxt(p.data_enviado,p._dataFat):'—';
    body+='<tr'+(p.status==='APROVADO'?' class="row-alerta"':'')+'><td class="mut">'+fmtData(p.data_pedido)+'</td><td class="mut">'+cEnv+'</td><td class="mut">'+cFat+'</td><td><b>'+p.marca+'</b></td><td>'+lojaNome(p.loja)+'</td><td class="num">'+brl(p.valor_total)+'</td>'+
      '<td><span class="pill s-'+p.status+'">'+p.status+'</span>'+(p._noERP?' <span class="mut" style="font-size:10px" title="NF já lançada no ERP — contada na linha do ERP, não recontada aqui">no ERP</span>':'')+'</td>'+mtds+
      '<td class="right acoes"><button class="btn sec mini" onclick="editar(\''+p.id+'\')">Editar</button>'+(DB.isOwner?' '+statusSelect(p):'')+'</td></tr>';});
  body+=footerPagar(jan,5,1,1);
  var mh=jan.map(function(m){return '<th class="num">'+nomeMes(m)+'</th>';}).join('');
  el('main').innerHTML='<div class="card"><h2>Pedidos ('+ps.length+')</h2>'+
    '<p class="mut" style="margin:-8px 0 12px;font-weight:600">Ordenados pela <b>data de lançamento</b> — o mais antigo primeiro. As colunas <b>Enviado em</b> e <b>Faturado em</b> (esta vinda das NFes do ERP) mostram o trâmite com os dias de cada etapa: lançamento → envio → faturamento. Ao marcar <b>ENVIADO</b>, os meses são recalculados pela data do envio; ao <b>FATURADO</b> (ou aplicando a NF detectada no ERP), pela data do faturamento — que é o que realmente vale. Colunas de mês = valor que vence em cada um dos próximos 6 meses (R$, arredondado); pedidos ENTREGUE não exibem valores nos meses. O bloco final mostra o <b>total comprometido</b> = pedidos em trânsito (enviado + faturado) + contas a pagar já lançado no ERP (por vencimento) — o MESMO total da aba Aprovações. 💡 Filtre a loja <b>Altamira</b> para ver separado em L1 e L4.</p>'+
    banner+bannerFat+
    '<div style="overflow:auto"><table>'+
    '<tr><th>Data</th><th>Enviado em</th><th>Faturado em</th><th>Marca</th><th>Loja</th><th class="num">Valor</th><th>Status</th>'+mh+'<th class="acoes"></th></tr>'+body+'</table></div></div>';
}
function statusSelect(p){return '<select onchange="mudaStatus(\''+p.id+'\',this.value)" style="width:auto;display:inline-block;margin-left:6px">'+STATUS.map(function(s){return '<option '+(p.status===s?'selected':'')+'>'+s+'</option>';}).join('')+'</select>';}
function editar(id){EDIT=DB.pedidos.filter(function(p){return p.id===id;})[0];TAB='lancar';render();}

function renderLimites(){
  var lim={};DB.limites.forEach(function(l){lim[l.loja+'|'+l.mes]=l.valor;});
  var html='<div class="card"><h2>Limite de compra por loja e mês</h2><p class="mut" style="margin-top:-8px">Defina o teto de cada mês. Edite e tecle Enter.</p>';
  lojasVisiveis().forEach(function(lo){html+='<div class="lojahead">'+lo.nome+'</div><div style="overflow:auto"><table><tr>';
    DB.meses.forEach(function(m){html+='<th class="num">'+nomeMes(m)+'</th>';});html+='</tr><tr>';
    DB.meses.forEach(function(m){var v=lim[lo.id+'|'+m]||'';html+='<td><input type="number" step="100" value="'+v+'" style="width:108px" onchange="setLim(\''+lo.id+'\',\''+m+'\',this.value,this)"></td>';});
    html+='</tr></table></div>';});
  el('main').innerHTML=html+'</div>';
}
async function setLim(loja,mes,v,inp){
  if(inp)inp.style.borderColor='var(--accent)';
  var {error}=await sb.from('limites').upsert([{loja:loja,mes:mes,valor:Number(v)||0,atualizado_por:DB.email,data:new Date().toISOString()}],{onConflict:'loja,mes'});
  if(error){if(inp)inp.style.borderColor='var(--crit)';toast('Erro: '+error.message);return;}
  if(inp)inp.style.borderColor='';toast('Limite salvo: '+nomeMes(mes));
  var i=DB.limites.findIndex(function(l){return l.loja===loja&&l.mes===mes;});
  if(i>=0)DB.limites[i].valor=Number(v)||0; else DB.limites.push({loja:loja,mes:mes,valor:Number(v)||0});
  DB.otb=computeOTB(DB.pedidos,DB.limites);
}
</script>
